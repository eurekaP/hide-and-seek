<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shy Girl</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #87ceeb;
    font-family: system-ui, sans-serif;
    color: #1f2937;
  }
  #hint {
    position: fixed;
    top: 16px;
    left: 16px;
    font-size: 14px;
    opacity: 0.85;
    pointer-events: none;
    text-shadow: 0 1px 2px rgba(255,255,255,0.6);
  }
  #clock {
    position: fixed;
    top: 16px;
    right: 16px;
    font-size: 14px;
    font-variant-numeric: tabular-nums;
    opacity: 0.85;
    pointer-events: none;
    text-shadow: 0 1px 2px rgba(255,255,255,0.6);
  }
  #weather {
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    padding: 6px;
    background: rgba(255, 255, 255, 0.35);
    backdrop-filter: blur(8px);
    border-radius: 14px;
    box-shadow: 0 4px 18px rgba(0, 0, 0, 0.15);
    z-index: 10;
  }
  #weather button {
    border: none;
    background: rgba(255, 255, 255, 0.55);
    padding: 6px 12px;
    border-radius: 10px;
    font-size: 13px;
    cursor: pointer;
    transition: transform 0.1s, background 0.15s;
    font-family: inherit;
    color: #1f2937;
  }
  #weather button:hover { background: rgba(255, 255, 255, 0.85); }
  #weather button.active {
    background: #1f2937;
    color: #fef3c7;
    transform: translateY(-1px);
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>
<div id="hint">She's shy — try to catch her with a click!</div>
<div id="clock">--:--</div>
<div id="weather">
  <button data-w="sunny" class="active">☀️ Sunny</button>
  <button data-w="cloudy">⛅ Cloudy</button>
  <button data-w="rainy">🌧️ Rainy</button>
  <button data-w="stormy">⛈️ Stormy</button>
  <button data-w="snowy">❄️ Snowy</button>
  <button data-w="foggy">🌫️ Foggy</button>
</div>
<canvas id="stage"></canvas>
<script>
  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d');

  let width, height;
  function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const ellipse = {
    x: window.innerWidth / 2,
    y: window.innerHeight / 2,
    rx: 70,
    ry: 130,
    vx: 0,
    vy: 0,
  };

  const mouse = { x: -9999, y: -9999 };
  window.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  });
  window.addEventListener('mouseleave', () => {
    mouse.x = -9999;
    mouse.y = -9999;
  });

  // -------- Evolution state --------
  let mode = 'normal'; // 'normal' | 'angel' | 'vampire'
  let _prevDayT = 0.35; // previous frame's day cycle t (matches the offset used in dayIndex)
  let teleportCooldown = 0;  // timestamp until next teleport allowed
  const poofs = [];          // {x, y, born, duration} — vampire teleport puffs
  const SUNSET_T = 0.78;
  const SUNRISE_T = 0.22;

  function currentDayT() {
    const elapsed = (performance.now() - startTime) / 1000;
    return ((elapsed / CYCLE_SECONDS) + 0.35) % 1;
  }
  function isNight() {
    const t = currentDayT();
    return t < SUNRISE_T || t > SUNSET_T;
  }

  function checkDayNightTransition() {
    const t = currentDayT();
    const crossedSunset  = _prevDayT < SUNSET_T  && t >= SUNSET_T;
    const crossedSunrise = _prevDayT < SUNRISE_T && t >= SUNRISE_T;
    // Angel mode ends at sunset (day is over); vampire mode ends at sunrise (night is over).
    if (crossedSunset && mode === 'angel') {
      mode = 'normal';
      isSitting = false;
      floatingMessages.push({
        text: '🌇 Day fades…',
        x: ellipse.x, y: ellipse.y - ellipse.ry - 18,
        born: performance.now(), duration: 2200,
      });
    }
    if (crossedSunrise && mode === 'vampire') {
      mode = 'normal';
      isSitting = false;
      floatingMessages.push({
        text: '🌅 Dawn breaks…',
        x: ellipse.x, y: ellipse.y - ellipse.ry - 18,
        born: performance.now(), duration: 2200,
      });
    }
    _prevDayT = t;
  }

  // -------- Floating catch messages --------
  const CATCH_MESSAGES = ['Gotcha!', 'Found you!', 'Tag!', 'Caught ya!', 'Boop!', "Got 'em!"];
  const floatingMessages = []; // {text, x, y, born, duration}

  window.addEventListener('click', (e) => {
    const dx = (e.clientX - ellipse.x) / ellipse.rx;
    const dy = (e.clientY - ellipse.y) / ellipse.ry;
    if (dx * dx + dy * dy <= 1) {
      if (mode === 'normal') {
        // Evolve — angel during day, vampire at night
        const night = isNight();
        mode = night ? 'vampire' : 'angel';
        isSitting = false;
        floatingMessages.push({
          text: night ? '🦇 Vampire mode 🦇' : '✨ Angel mode! ✨',
          x: ellipse.x,
          y: ellipse.y - ellipse.ry - 18,
          born: performance.now(),
          duration: 2200,
        });
      } else {
        const text = CATCH_MESSAGES[Math.floor(Math.random() * CATCH_MESSAGES.length)];
        floatingMessages.push({
          text,
          x: ellipse.x,
          y: ellipse.y - ellipse.ry - 18,
          born: performance.now(),
          duration: 1500,
        });
      }
    }
  });

  function drawFloatingMessages(now) {
    for (let i = floatingMessages.length - 1; i >= 0; i--) {
      const m = floatingMessages[i];
      const elapsed = now - m.born;
      if (elapsed >= m.duration) {
        floatingMessages.splice(i, 1);
        continue;
      }
      const t = elapsed / m.duration;          // 0..1
      const yOffset = -t * 70;                  // float upward
      let alpha;
      if (t < 0.12) alpha = t / 0.12;          // fade in
      else if (t > 0.7) alpha = (1 - t) / 0.3; // fade out
      else alpha = 1;
      // Pop scale: start large, settle to 1, then drift up
      const scale = 0.7 + Math.min(1, t / 0.12) * 0.4;

      ctx.save();
      ctx.translate(m.x, m.y + yOffset);
      ctx.scale(scale, scale);
      ctx.font = 'bold 32px system-ui, "Noto Sans KR", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.lineWidth = 5;
      ctx.lineJoin = 'round';
      ctx.strokeStyle = `rgba(31, 41, 55, ${alpha * 0.85})`;
      ctx.strokeText(m.text, 0, 0);
      ctx.fillStyle = `rgba(254, 240, 138, ${alpha})`;
      ctx.fillText(m.text, 0, 0);
      ctx.restore();
    }
  }

  const FEAR_RADIUS = 220;
  const MAX_SPEED = 14;
  const FRICTION = 0.88;

  // -------- Day / sky / clouds --------
  const CYCLE_SECONDS = 90; // one full day every 90 seconds
  const startTime = performance.now();
  const clockEl = document.getElementById('clock');

  function lerp(a, b, t) { return a + (b - a) * t; }
  function lerpC(c1, c2, t) {
    return [
      Math.round(lerp(c1[0], c2[0], t)),
      Math.round(lerp(c1[1], c2[1], t)),
      Math.round(lerp(c1[2], c2[2], t)),
    ];
  }
  function rgb(c, a = 1) {
    return a < 1 ? `rgba(${c[0]},${c[1]},${c[2]},${a})` : `rgb(${c[0]},${c[1]},${c[2]})`;
  }

  // Sky keyframes around a 24h day (t in [0,1], 0 = midnight)
  const SKY = [
    { t: 0.00, top: [10, 14, 39],    bot: [26, 26, 62] },     // midnight
    { t: 0.20, top: [74, 58, 110],   bot: [255, 170, 130] },  // dawn
    { t: 0.30, top: [135, 206, 235], bot: [255, 224, 178] },  // sunrise
    { t: 0.50, top: [77, 171, 247],  bot: [185, 226, 255] },  // noon
    { t: 0.70, top: [116, 192, 252], bot: [255, 214, 165] },  // afternoon
    { t: 0.80, top: [255, 107, 157], bot: [255, 158, 110] },  // sunset
    { t: 0.90, top: [61, 43, 86],    bot: [200, 90, 130] },   // dusk
    { t: 1.00, top: [10, 14, 39],    bot: [26, 26, 62] },     // midnight
  ];

  function skyColors(t) {
    for (let i = 0; i < SKY.length - 1; i++) {
      const a = SKY[i], b = SKY[i + 1];
      if (t >= a.t && t <= b.t) {
        const k = (t - a.t) / (b.t - a.t);
        return { top: lerpC(a.top, b.top, k), bot: lerpC(a.bot, b.bot, k) };
      }
    }
    return { top: SKY[0].top, bot: SKY[0].bot };
  }

  // Clouds — drift across, wrap around
  const clouds = [];
  function spawnClouds() {
    clouds.length = 0;
    const count = 7;
    for (let i = 0; i < count; i++) {
      clouds.push({
        x: Math.random() * width,
        y: 40 + Math.random() * (height * 0.4),
        scale: 1.2 + Math.random() * 1.4,
        speed: 8 + Math.random() * 18, // px/sec
        puffs: 3 + Math.floor(Math.random() * 3),
      });
    }
  }

  // Stars — only visible at night
  const stars = [];
  function spawnStars() {
    stars.length = 0;
    for (let i = 0; i < 80; i++) {
      stars.push({
        x: Math.random() * width,
        y: Math.random() * height * 0.7,
        r: Math.random() * 1.4 + 0.3,
        phase: Math.random() * Math.PI * 2,
      });
    }
  }

  // Ground decorations — grass blades, flowers, bench
  const ground = { grass: [], flowers: [], benches: [] };

  function spawnGround() {
    ground.grass.length = 0;
    ground.flowers.length = 0;
    ground.benches.length = 0;

    const horizon = height * 0.82;
    const groundH = height - horizon;

    // Grass blades — more dense and bigger toward foreground
    const grassCount = Math.max(180, Math.floor(width / 4));
    for (let i = 0; i < grassCount; i++) {
      const depth = Math.pow(Math.random(), 0.5); // bias toward bottom
      ground.grass.push({
        x: Math.random() * width,
        y: horizon + depth * groundH,
        h: 3 + depth * 14,
        lean: (Math.random() - 0.5) * 0.5,
        phase: Math.random() * Math.PI * 2,
        shade: 0.7 + Math.random() * 0.4,
      });
    }

    // Flowers
    const palette = [
      [251, 191, 36],  // yellow
      [248, 113, 113], // red
      [251, 113, 133], // pink
      [255, 255, 255], // white
      [192, 132, 252], // lavender
    ];
    const flowerCount = Math.max(20, Math.floor(width / 35));
    for (let i = 0; i < flowerCount; i++) {
      const depth = Math.pow(Math.random(), 0.4);
      ground.flowers.push({
        x: Math.random() * width,
        y: horizon + 8 + depth * (groundH - 10),
        size: 2.5 + depth * 3.5,
        stemH: 6 + depth * 9,
        color: palette[Math.floor(Math.random() * palette.length)],
      });
    }

    // Bench — fixed at ~22% from left, sitting on horizon
    ground.benches.push({ x: width * 0.22, y: horizon });
  }

  function drawWing(cx, anchorY, side, wet, flapPhase) {
    const baseX = cx + side * 14;
    const baseY = anchorY - 4;
    // Slight flap motion when flying (not wet)
    const flap = wet ? 0 : flapPhase * 6;

    const featherLight = wet ? '#9aa3b1' : '#fbfcfe';
    const featherMid   = wet ? '#7d8694' : '#e6ebf2';
    const featherEdge  = wet ? '#5e6776' : '#c8cfd9';

    ctx.save();

    if (wet) {
      // Sagging, drooping wet wing
      ctx.fillStyle = featherLight;
      ctx.beginPath();
      ctx.moveTo(baseX, baseY);
      ctx.bezierCurveTo(
        baseX + side * 26, baseY + 6,
        baseX + side * 30, baseY + 38,
        baseX + side * 22, baseY + 62
      );
      ctx.quadraticCurveTo(baseX + side * 14, baseY + 58, baseX + side * 16, baseY + 46);
      ctx.bezierCurveTo(
        baseX + side * 8,  baseY + 28,
        baseX + side * 2,  baseY + 12,
        baseX, baseY
      );
      ctx.closePath();
      ctx.fill();

      // Inner shadow
      ctx.fillStyle = featherMid;
      ctx.beginPath();
      ctx.moveTo(baseX + side * 4, baseY + 4);
      ctx.bezierCurveTo(
        baseX + side * 14, baseY + 18,
        baseX + side * 18, baseY + 40,
        baseX + side * 14, baseY + 52
      );
      ctx.quadraticCurveTo(baseX + side * 8, baseY + 36, baseX + side * 4, baseY + 4);
      ctx.closePath();
      ctx.fill();

      // Drip
      ctx.fillStyle = 'rgba(120, 150, 180, 0.7)';
      ctx.beginPath();
      ctx.arc(baseX + side * 22, baseY + 66, 2, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // Spread wing — angled outward and upward
      // Outer wing layer
      ctx.fillStyle = featherLight;
      ctx.beginPath();
      ctx.moveTo(baseX, baseY);
      ctx.bezierCurveTo(
        baseX + side * 32, baseY - 38 + flap,
        baseX + side * 64, baseY - 30 + flap,
        baseX + side * 76, baseY - 8 + flap * 0.5
      );
      ctx.quadraticCurveTo(
        baseX + side * 62, baseY + 14,
        baseX + side * 30, baseY + 12
      );
      ctx.quadraticCurveTo(
        baseX + side * 14, baseY + 4,
        baseX, baseY
      );
      ctx.closePath();
      ctx.fill();

      // Inner feather row (slightly darker for depth)
      ctx.fillStyle = featherMid;
      ctx.beginPath();
      ctx.moveTo(baseX + side * 6, baseY + 2);
      ctx.bezierCurveTo(
        baseX + side * 28, baseY - 18 + flap * 0.7,
        baseX + side * 50, baseY - 14 + flap * 0.7,
        baseX + side * 58, baseY + 2
      );
      ctx.quadraticCurveTo(
        baseX + side * 42, baseY + 10,
        baseX + side * 22, baseY + 8
      );
      ctx.quadraticCurveTo(
        baseX + side * 12, baseY + 4,
        baseX + side * 6, baseY + 2
      );
      ctx.closePath();
      ctx.fill();

      // Radial feather lines for texture
      ctx.strokeStyle = featherEdge;
      ctx.lineWidth = 0.8;
      ctx.lineCap = 'round';
      const featherCount = 6;
      for (let i = 0; i < featherCount; i++) {
        const t = (i + 0.5) / featherCount;
        // Elevation angle from horizontal: 0 (outward) -> ~Math.PI/2 (up)
        const theta = 0.1 + 1.05 * t;
        const len = 70 - i * 5;
        const ex = baseX + side * Math.cos(theta) * len;
        const ey = baseY - Math.sin(theta) * len + flap * (1 - t * 0.4);
        ctx.beginPath();
        ctx.moveTo(baseX, baseY);
        ctx.lineTo(ex, ey);
        ctx.stroke();
      }
    }

    ctx.restore();
  }

  function drawBatWing(cx, anchorY, side, flapPhase) {
    const baseX = cx + side * 12;
    const baseY = anchorY - 4;
    const flap = flapPhase * 5;

    const membrane     = '#2a1626';
    const membraneDark = '#150a18';
    const membraneEdge = '#3d2640';

    ctx.save();

    // Main bat membrane — pointed thumb claw at top, scalloped lower edge
    ctx.fillStyle = membrane;
    ctx.beginPath();
    ctx.moveTo(baseX, baseY);
    // Upper edge sweeping out and up
    ctx.quadraticCurveTo(
      baseX + side * 22, baseY - 28 + flap,
      baseX + side * 50, baseY - 30 + flap
    );
    // Pointed claw at the upper tip
    ctx.lineTo(baseX + side * 60, baseY - 38 + flap);
    ctx.lineTo(baseX + side * 56, baseY - 24 + flap);
    // Outer wing tip
    ctx.lineTo(baseX + side * 70, baseY - 8 + flap * 0.5);
    // Scalloped lower edge — series of pointed dips between fingers
    const scallops = 4;
    const tipX = baseX + side * 70;
    const tipY = baseY - 8 + flap * 0.5;
    const innerX = baseX + side * 4;
    const innerY = baseY + 6;
    for (let i = 1; i <= scallops; i++) {
      const t = i / scallops;
      const endX = tipX + (innerX - tipX) * t;
      const endY = tipY + (innerY - tipY) * t;
      const prevT = (i - 1) / scallops;
      const startX = tipX + (innerX - tipX) * prevT;
      const startY = tipY + (innerY - tipY) * prevT;
      const midX = (startX + endX) / 2;
      const midY = (startY + endY) / 2 + 9; // dip outward (downward)
      ctx.quadraticCurveTo(midX, midY, endX, endY);
    }
    ctx.closePath();
    ctx.fill();

    // Finger ribs — radial dark lines from base to each scallop boundary
    ctx.strokeStyle = membraneDark;
    ctx.lineWidth = 1.4;
    ctx.lineCap = 'round';
    for (let i = 1; i < scallops; i++) {
      const t = i / scallops;
      const ex = tipX + (innerX - tipX) * t;
      const ey = tipY + (innerY - tipY) * t;
      ctx.beginPath();
      ctx.moveTo(baseX, baseY);
      ctx.lineTo(ex, ey);
      ctx.stroke();
    }
    // Top "thumb" rib to the upper claw
    ctx.beginPath();
    ctx.moveTo(baseX, baseY);
    ctx.lineTo(baseX + side * 60, baseY - 38 + flap);
    ctx.stroke();

    // Subtle highlight along the upper edge
    ctx.strokeStyle = membraneEdge;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(baseX + side * 5, baseY - 4);
    ctx.quadraticCurveTo(
      baseX + side * 25, baseY - 24 + flap,
      baseX + side * 48, baseY - 26 + flap
    );
    ctx.stroke();

    ctx.restore();
  }

  function drawPoof(p, now) {
    const elapsed = now - p.born;
    if (elapsed >= p.duration) return false;
    const t = elapsed / p.duration; // 0..1
    const radius = 6 + t * 32;
    const alpha = (1 - t) * 0.7;
    // Layered dark purple smoke
    ctx.fillStyle = `rgba(120, 50, 110, ${alpha * 0.55})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = `rgba(60, 20, 70, ${alpha})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, radius * 0.6, 0, Math.PI * 2);
    ctx.fill();
    return true;
  }

  function drawUmbrella(b, brightness) {
    if (weather !== 'rainy' && weather !== 'stormy') return;

    const fabric     = lerpC([200, 40, 55],  [85, 15, 22],  1 - brightness);
    const fabricDark = lerpC([110, 18, 28],  [40, 6, 10],   1 - brightness);
    const pole       = lerpC([65, 55, 45],   [25, 20, 15],  1 - brightness);
    const poleDark   = lerpC([40, 32, 24],   [15, 12, 8],   1 - brightness);

    ctx.save();
    ctx.translate(b.x, b.y);

    const halfCW = 150;
    const eaveY = -255;
    const peakY = -325;
    const poleW = 5;
    const poleBot = 8;
    const panels = 8;
    const scallopDepth = 11;

    // Pole + base
    ctx.fillStyle = rgb(pole);
    ctx.fillRect(-poleW / 2, peakY, poleW, poleBot - peakY);
    ctx.fillStyle = rgb(poleDark);
    ctx.fillRect(poleW / 2 - 1, peakY, 1, poleBot - peakY);
    ctx.fillStyle = rgb(lerpC([90, 80, 65], [35, 28, 18], 1 - brightness));
    ctx.beginPath();
    ctx.ellipse(0, poleBot, 16, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    // Canopy as 8 flat triangular panels meeting at the peak.
    // Panels near the center face the viewer (brighter); side panels are tilted away (darker).
    for (let i = 0; i < panels; i++) {
      const t1 = i / panels;
      const t2 = (i + 1) / panels;
      const xL = -halfCW + t1 * 2 * halfCW;
      const xR = -halfCW + t2 * 2 * halfCW;

      const tMid = (t1 + t2) / 2;
      const edgeness = Math.abs(tMid - 0.5) * 2; // 0 at center, 1 at edges
      const shade = 1 - edgeness * 0.30;
      const c = [
        Math.floor(fabric[0] * shade),
        Math.floor(fabric[1] * shade),
        Math.floor(fabric[2] * shade),
      ];
      ctx.fillStyle = rgb(c);
      ctx.beginPath();
      ctx.moveTo(0, peakY);
      ctx.lineTo(xL, eaveY);
      const midX = (xL + xR) / 2;
      ctx.quadraticCurveTo(midX, eaveY + scallopDepth, xR, eaveY);
      ctx.closePath();
      ctx.fill();
    }

    // Rib lines along the panel edges (slightly darker)
    ctx.strokeStyle = rgb(fabricDark);
    ctx.lineWidth = 1.2;
    for (let i = 0; i <= panels; i++) {
      const t = i / panels;
      const x = -halfCW + t * 2 * halfCW;
      ctx.beginPath();
      ctx.moveTo(0, peakY);
      ctx.lineTo(x, eaveY);
      ctx.stroke();
    }

    // Finial
    ctx.fillStyle = rgb(poleDark);
    ctx.beginPath();
    ctx.arc(0, peakY - 4, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = rgb(pole);
    ctx.beginPath();
    ctx.arc(0, peakY - 4, 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawFoldedUmbrella(centerX, baseY, lean, brightness) {
    // A closed parasol leaning upright against the bench backrest.
    const fabric     = lerpC([240, 180, 40],  [110, 80, 20],  1 - brightness);
    const fabricDark = lerpC([180, 120, 20],  [75, 50, 12],   1 - brightness);
    const tie        = lerpC([200, 145, 30],  [85, 60, 14],   1 - brightness);
    const wood       = lerpC([110, 75, 40],  [45, 28, 15],  1 - brightness);
    const woodDark   = lerpC([70, 45, 22],   [25, 16, 8],   1 - brightness);

    ctx.save();
    ctx.translate(centerX, baseY);
    ctx.rotate(lean);

    const L = 95;          // total length of the closed umbrella
    const headW = 6;       // half-width at the canopy/head end
    const tipW = 1.5;      // half-width at the pointy tip

    // Body — tapered shape from head to tip (head at top, tip on the seat going down)
    // In local coords after rotation: vertical axis with head at top, tip at bottom.
    ctx.fillStyle = rgb(fabric);
    ctx.beginPath();
    ctx.moveTo(-headW, -L);
    ctx.lineTo( headW, -L);
    ctx.lineTo( tipW,   0);
    ctx.lineTo(-tipW,   0);
    ctx.closePath();
    ctx.fill();

    // A couple of vertical fold creases for fabric texture
    ctx.strokeStyle = rgb(fabricDark);
    ctx.lineWidth = 0.8;
    for (const k of [-0.4, 0, 0.4]) {
      const xTop = k * headW;
      const xBot = k * tipW;
      ctx.beginPath();
      ctx.moveTo(xTop, -L + 2);
      ctx.lineTo(xBot, -2);
      ctx.stroke();
    }

    // Tie/band around the upper part (suggests the umbrella is strapped closed)
    ctx.fillStyle = rgb(tie);
    ctx.fillRect(-headW - 1, -L * 0.78, headW * 2 + 2, 4);

    // Pointy tip
    ctx.fillStyle = rgb(woodDark);
    ctx.beginPath();
    ctx.moveTo(-tipW, 0);
    ctx.lineTo(tipW, 0);
    ctx.lineTo(0, 6);
    ctx.closePath();
    ctx.fill();

    // J-hook handle at the top (curves outward to the right relative to local axis)
    ctx.strokeStyle = rgb(wood);
    ctx.lineWidth = 3.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, -L);
    ctx.lineTo(0, -L - 10);
    ctx.quadraticCurveTo(8, -L - 14, 8, -L - 6);
    ctx.stroke();
    // Handle darker side stripe
    ctx.strokeStyle = rgb(woodDark);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(1, -L);
    ctx.lineTo(1, -L - 8);
    ctx.stroke();

    ctx.restore();
  }

  function drawOpenPortableUmbrella(handX, handY, brightness) {
    if (weather !== 'rainy' && weather !== 'stormy') return;

    const fabric    = lerpC([245, 190, 50],   [115, 85, 22],  1 - brightness);
    const fabDark   = lerpC([170, 115, 18],   [70, 48, 10],   1 - brightness);
    const fabUnder  = lerpC([195, 140, 25],   [82, 58, 13],   1 - brightness);
    const fabHigh   = [255, 230, 140];
    const pole      = lerpC([110, 75, 40],   [45, 28, 15],  1 - brightness);
    const poleDark  = lerpC([70, 45, 22],    [25, 16, 8],   1 - brightness);

    ctx.save();
    ctx.translate(handX, handY);

    const halfCW = 92;       // canopy half-width — total 184px, well wider than her ~50 body
    const eaveY = -58;       // canopy bottom outer edge above hand
    const peakY = -108;      // canopy top above hand
    const domeH = eaveY - peakY;
    const panels = 8;
    const scallopDepth = 9;
    const poleW = 3;

    // Pole from hand up to canopy peak
    ctx.fillStyle = rgb(pole);
    ctx.fillRect(-poleW / 2, peakY, poleW, 0 - peakY);

    // J-hook handle just below the hand
    ctx.strokeStyle = rgb(pole);
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, 10);
    ctx.quadraticCurveTo(8, 14, 8, 6);
    ctx.stroke();

    // Underside band — suggests the canopy curves inward at the rim
    ctx.fillStyle = rgb(fabUnder);
    ctx.beginPath();
    ctx.moveTo(-halfCW, eaveY);
    ctx.quadraticCurveTo(0, eaveY + 9, halfCW, eaveY);
    ctx.quadraticCurveTo(0, eaveY + 2, -halfCW, eaveY);
    ctx.closePath();
    ctx.fill();

    // Rounded dome (half-ellipse) with scalloped bottom edge
    ctx.fillStyle = rgb(fabric);
    ctx.beginPath();
    ctx.moveTo(-halfCW, eaveY);
    ctx.ellipse(0, eaveY, halfCW, domeH, 0, Math.PI, 2 * Math.PI);
    for (let i = panels; i > 0; i--) {
      const t1 = i / panels;
      const t2 = (i - 1) / panels;
      const xR = -halfCW + t1 * 2 * halfCW;
      const xL = -halfCW + t2 * 2 * halfCW;
      const midX = (xL + xR) / 2;
      ctx.quadraticCurveTo(midX, eaveY + scallopDepth, xL, eaveY);
    }
    ctx.closePath();
    ctx.fill();

    // Soft highlight on the upper-left of the dome (clipped to the dome shape)
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(-halfCW, eaveY);
    ctx.ellipse(0, eaveY, halfCW, domeH, 0, Math.PI, 2 * Math.PI);
    ctx.lineTo(halfCW, eaveY);
    ctx.closePath();
    ctx.clip();
    const hi = ctx.createRadialGradient(
      -halfCW * 0.35, peakY + domeH * 0.35, 4,
      -halfCW * 0.35, peakY + domeH * 0.35, halfCW * 0.75
    );
    hi.addColorStop(0, `rgba(${fabHigh[0]}, ${fabHigh[1]}, ${fabHigh[2]}, 0.45)`);
    hi.addColorStop(1, `rgba(${fabHigh[0]}, ${fabHigh[1]}, ${fabHigh[2]}, 0)`);
    ctx.fillStyle = hi;
    ctx.fillRect(-halfCW, peakY - 4, halfCW * 2, domeH + 4);
    ctx.restore();

    // Curved rib lines suggesting panels; each rib bulges outward along the dome
    ctx.strokeStyle = rgb(fabDark);
    ctx.lineWidth = 0.9;
    for (let i = 0; i <= panels; i++) {
      const t = i / panels;
      const x = -halfCW + t * 2 * halfCW;
      const cpX = x * 0.55;
      const cpY = peakY + domeH * 0.45;
      ctx.beginPath();
      ctx.moveTo(0, peakY);
      ctx.quadraticCurveTo(cpX, cpY, x, eaveY);
      ctx.stroke();
    }

    // Rim shadow tucked under the canopy edge
    ctx.strokeStyle = rgb(fabDark);
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(-halfCW, eaveY);
    ctx.quadraticCurveTo(0, eaveY + 5, halfCW, eaveY);
    ctx.stroke();

    // Finial
    ctx.fillStyle = rgb(poleDark);
    ctx.beginPath();
    ctx.arc(0, peakY - 3, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawBench(b, brightness) {
    const wood = lerpC([139, 90, 43], [55, 35, 16], 1 - brightness);
    const woodDark = lerpC([92, 51, 23], [35, 22, 10], 1 - brightness);
    const woodLight = lerpC([176, 124, 70], [70, 48, 22], 1 - brightness);

    // Bench dimensions — seats 2 adults but scaled down to look right next to the character
    const W = 220;            // total width
    const halfW = W / 2;
    const seatTopY = -62;     // top surface of seat (low enough that sitting drops her height)
    const seatThick = 11;
    const seatBotY = seatTopY + seatThick;
    const legBotY = 8;        // legs sink slightly into ground
    const backTopY = -150;    // top of backrest
    const armrestH = 7;
    const armrestTopY = seatTopY - 40;

    ctx.save();
    ctx.translate(b.x, b.y);

    // Back legs (drawn first, behind everything)
    ctx.fillStyle = rgb(woodDark);
    ctx.fillRect(-halfW + 10, seatBotY - 4, 8, legBotY - seatBotY + 4);
    ctx.fillRect(halfW - 18, seatBotY - 4, 8, legBotY - seatBotY + 4);

    // Backrest posts (run from ground up through seat to back top)
    ctx.fillStyle = rgb(wood);
    ctx.fillRect(-halfW + 8, backTopY, 10, legBotY - backTopY);
    ctx.fillRect(halfW - 18, backTopY, 10, legBotY - backTopY);
    // middle support
    ctx.fillRect(-5, backTopY + 14, 8, seatTopY - (backTopY + 14));

    // Backrest horizontal slats
    ctx.fillStyle = rgb(woodLight);
    ctx.fillRect(-halfW + 4, backTopY, W - 8, 10);
    ctx.fillStyle = rgb(wood);
    ctx.fillRect(-halfW + 4, backTopY + 26, W - 8, 9);
    ctx.fillRect(-halfW + 4, backTopY + 52, W - 8, 9);
    ctx.fillRect(-halfW + 4, backTopY + 78, W - 8, 9);

    // Front legs (slightly slanted outward) — drawn before seat so seat covers tops
    ctx.fillStyle = rgb(woodDark);
    ctx.beginPath();
    ctx.moveTo(-halfW + 18, seatBotY - 4);
    ctx.lineTo(-halfW + 8, legBotY);
    ctx.lineTo(-halfW + 22, legBotY);
    ctx.lineTo(-halfW + 28, seatBotY - 4);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(halfW - 28, seatBotY - 4);
    ctx.lineTo(halfW - 22, legBotY);
    ctx.lineTo(halfW - 8, legBotY);
    ctx.lineTo(halfW - 18, seatBotY - 4);
    ctx.closePath();
    ctx.fill();

    // Cross brace between front legs
    ctx.fillStyle = rgb(woodDark);
    ctx.fillRect(-halfW + 24, legBotY - 12, W - 48, 5);

    // Seat — front edge highlight
    ctx.fillStyle = rgb(woodLight);
    ctx.fillRect(-halfW, seatTopY, W, 5);
    ctx.fillStyle = rgb(wood);
    ctx.fillRect(-halfW, seatTopY + 5, W, seatThick - 5);
    ctx.fillStyle = rgb(woodDark);
    ctx.fillRect(-halfW, seatBotY - 3, W, 3);

    // Plank seam down the middle of seat (suggests two planks side by side)
    ctx.fillStyle = rgb(woodDark);
    ctx.fillRect(-halfW + 4, seatTopY + seatThick / 2 - 1, W - 8, 1.5);

    // Armrests
    ctx.fillStyle = rgb(wood);
    // left armrest top
    ctx.fillRect(-halfW + 4, armrestTopY, 30, armrestH);
    // left armrest support
    ctx.fillRect(-halfW + 12, armrestTopY + armrestH, 8, seatTopY - (armrestTopY + armrestH));
    // right armrest top
    ctx.fillRect(halfW - 34, armrestTopY, 30, armrestH);
    // right armrest support
    ctx.fillRect(halfW - 20, armrestTopY + armrestH, 8, seatTopY - (armrestTopY + armrestH));

    // Snow caps on horizontal surfaces
    if (snowDepth > 0.03) {
      const capAlpha = Math.min(0.95, snowDepth * 1.1);
      ctx.fillStyle = `rgba(245, 248, 255, ${capAlpha})`;
      const capH = 3 + snowDepth * 6;
      // wavy snow on top of backrest
      const drawWavyCap = (x0, x1, topY) => {
        ctx.beginPath();
        ctx.moveTo(x0, topY + 2);
        for (let x = x0; x <= x1; x += 6) {
          const n = Math.sin(x * 0.2) * 1.2 + Math.sin(x * 0.5) * 0.6;
          ctx.lineTo(x, topY - capH + n * snowDepth);
        }
        ctx.lineTo(x1, topY + 2);
        ctx.closePath();
        ctx.fill();
      };
      drawWavyCap(-halfW + 4, halfW - 4, backTopY);
      drawWavyCap(-halfW, halfW, seatTopY);
      drawWavyCap(-halfW + 4, -halfW + 34, armrestTopY);
      drawWavyCap(halfW - 34, halfW - 4, armrestTopY);
    }

    ctx.restore();
  }

  spawnClouds();
  spawnStars();
  spawnGround();

  // -------- Wardrobe (a different dress color each day) --------
  const DRESS_PALETTE = [
    { normal: '#f472b6', dark: '#db2777', scared: '#fb7185', scaredDark: '#e11d48', bow: '#ec4899' }, // pink
    { normal: '#fbbf24', dark: '#d97706', scared: '#fcd34d', scaredDark: '#b45309', bow: '#f59e0b' }, // sunflower
    { normal: '#34d399', dark: '#059669', scared: '#6ee7b7', scaredDark: '#047857', bow: '#10b981' }, // mint
    { normal: '#a78bfa', dark: '#7c3aed', scared: '#c4b5fd', scaredDark: '#6d28d9', bow: '#8b5cf6' }, // lavender
    { normal: '#60a5fa', dark: '#2563eb', scared: '#93c5fd', scaredDark: '#1d4ed8', bow: '#3b82f6' }, // sky
    { normal: '#f87171', dark: '#dc2626', scared: '#fca5a5', scaredDark: '#b91c1c', bow: '#ef4444' }, // coral
    { normal: '#fb923c', dark: '#ea580c', scared: '#fdba74', scaredDark: '#c2410c', bow: '#f97316' }, // tangerine
  ];
  function dayIndex() {
    const elapsed = (performance.now() - startTime) / 1000;
    return Math.floor(elapsed / CYCLE_SECONDS + 0.35);
  }

  const OUTFIT_TYPES = [
    'bell', 'gown', 'sundress', 'tee-skirt', 'overalls', 'shorts-tank', 'polka', 'sailor',
  ];

  // Roll a fresh outfit and color each new day; keep them stable within the day
  let _outfitDay = -1;
  let _dressIdx = 0;
  let _outfitIdx = 0;
  function maybeRollOutfit() {
    const d = dayIndex();
    if (d !== _outfitDay) {
      _dressIdx = Math.floor(Math.random() * DRESS_PALETTE.length);
      _outfitIdx = Math.floor(Math.random() * OUTFIT_TYPES.length);
      _outfitDay = d;
    }
  }
  function currentDress() { maybeRollOutfit(); return DRESS_PALETTE[_dressIdx]; }
  function currentOutfitType() { maybeRollOutfit(); return OUTFIT_TYPES[_outfitIdx]; }

  // -------- Weather --------
  let weather = 'sunny';
  let lightningEnd = 0;
  let lightningNext = 0;
  let lightningStart = 0;
  let lightningBolt = null; // { main: [{x,y}], branches: [[{x,y}]] }

  function generateBolt() {
    const segs = 8 + Math.floor(Math.random() * 5);
    const startX = width * (0.15 + Math.random() * 0.7);
    const startY = 20 + Math.random() * 80;
    const endY = height * (0.7 + Math.random() * 0.1);
    const main = [{ x: startX, y: startY }];
    let x = startX;
    for (let i = 1; i <= segs; i++) {
      const y = startY + (endY - startY) * (i / segs);
      x += (Math.random() - 0.5) * 70;
      main.push({ x, y });
    }
    const branches = [];
    const branchCount = 1 + Math.floor(Math.random() * 3);
    for (let b = 0; b < branchCount; b++) {
      const idx = 1 + Math.floor(Math.random() * (main.length - 2));
      const root = main[idx];
      const segs2 = 3 + Math.floor(Math.random() * 4);
      const dir = Math.random() < 0.5 ? -1 : 1;
      const pts = [root];
      let bx = root.x, by = root.y;
      for (let i = 1; i <= segs2; i++) {
        bx += dir * (12 + Math.random() * 28);
        by += 18 + Math.random() * 40;
        pts.push({ x: bx, y: by });
      }
      branches.push(pts);
    }
    return { main, branches };
  }

  function strokePolyline(pts, color, width) {
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    for (let i = 0; i < pts.length; i++) {
      if (i === 0) ctx.moveTo(pts[i].x, pts[i].y);
      else ctx.lineTo(pts[i].x, pts[i].y);
    }
    ctx.stroke();
  }

  function drawLightningBolt(bolt, alpha) {
    // Outer glow halo (wide, soft, pale blue)
    strokePolyline(bolt.main, `rgba(180, 210, 255, ${alpha * 0.35})`, 14);
    for (const br of bolt.branches) {
      strokePolyline(br, `rgba(180, 210, 255, ${alpha * 0.25})`, 8);
    }
    // Middle layer (tighter glow)
    strokePolyline(bolt.main, `rgba(220, 235, 255, ${alpha * 0.6})`, 6);
    for (const br of bolt.branches) {
      strokePolyline(br, `rgba(220, 235, 255, ${alpha * 0.5})`, 3);
    }
    // Bright core (thin, almost white)
    strokePolyline(bolt.main, `rgba(255, 255, 250, ${alpha})`, 2);
    for (const br of bolt.branches) {
      strokePolyline(br, `rgba(255, 255, 245, ${alpha * 0.9})`, 1.2);
    }
  }
  let snowDepth = 0;   // 0..1 white blanket / bench caps
  let wetness = 0;     // 0..1 puddle accumulation rate
  const puddles = [];  // {x, y, size, alpha, targetAlpha}

  function updateAccumulation(dt) {
    // Snow build-up / melt
    if (weather === 'snowy') {
      snowDepth = Math.min(1, snowDepth + dt * 0.05);
    } else {
      snowDepth = Math.max(0, snowDepth - dt * 0.04);
    }

    // Puddle spawning / drying
    const horizon = height * 0.82;
    if (weather === 'rainy' || weather === 'stormy') {
      const rate = weather === 'stormy' ? 8 : 4;
      wetness = Math.min(1, wetness + dt * 0.1);
      if (Math.random() < dt * rate && puddles.length < 40) {
        puddles.push({
          x: Math.random() * width,
          y: horizon + 4 + Math.random() * (height - horizon - 10),
          size: 8 + Math.random() * 26,
          alpha: 0,
          targetAlpha: 0.45 + Math.random() * 0.3,
        });
      }
      for (const p of puddles) {
        p.alpha = Math.min(p.targetAlpha, p.alpha + dt * 0.4);
      }
    } else {
      wetness = Math.max(0, wetness - dt * 0.06);
      for (const p of puddles) p.alpha = Math.max(0, p.alpha - dt * 0.18);
      for (let i = puddles.length - 1; i >= 0; i--) {
        if (puddles[i].alpha <= 0) puddles.splice(i, 1);
      }
    }
  }

  function drawSnowGround() {
    if (snowDepth <= 0.001) return;
    const horizon = height * 0.82;
    const peakH = 16 * snowDepth;
    ctx.fillStyle = `rgba(245, 248, 255, ${Math.min(0.95, snowDepth * 0.95)})`;
    ctx.beginPath();
    ctx.moveTo(0, height);
    ctx.lineTo(0, horizon);
    for (let x = 0; x <= width; x += 10) {
      const noise = (Math.sin(x * 0.04) + Math.sin(x * 0.13) * 0.6) * peakH * 0.45 + peakH * 0.55;
      ctx.lineTo(x, horizon - noise);
    }
    ctx.lineTo(width, horizon);
    ctx.lineTo(width, height);
    ctx.closePath();
    ctx.fill();
  }

  function drawPuddles() {
    for (const p of puddles) {
      if (p.alpha <= 0) continue;
      // dark wet base
      ctx.fillStyle = `rgba(45, 70, 105, ${p.alpha * 0.65})`;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size, p.size * 0.32, 0, 0, Math.PI * 2);
      ctx.fill();
      // sky reflection highlight
      ctx.fillStyle = `rgba(200, 220, 240, ${p.alpha * 0.55})`;
      ctx.beginPath();
      ctx.ellipse(p.x - p.size * 0.25, p.y - p.size * 0.08, p.size * 0.55, p.size * 0.13, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  const rainDrops = [];
  function spawnRain(count) {
    rainDrops.length = 0;
    for (let i = 0; i < count; i++) {
      rainDrops.push({
        x: Math.random() * (width + 200) - 100,
        y: Math.random() * height,
        len: 12 + Math.random() * 8,
        speed: 700 + Math.random() * 400,
      });
    }
  }

  const snowflakes = [];
  function spawnSnow(count) {
    snowflakes.length = 0;
    for (let i = 0; i < count; i++) {
      snowflakes.push({
        x: Math.random() * width,
        y: Math.random() * height,
        size: 1 + Math.random() * 2.5,
        speed: 30 + Math.random() * 50,
        drift: 0.5 + Math.random() * 1.5,
        phase: Math.random() * Math.PI * 2,
      });
    }
  }

  spawnRain(220);
  spawnSnow(180);

  function setWeather(w) {
    weather = w;
    document.querySelectorAll('#weather button').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.w === w);
    });
    // Re-spawn clouds with weather-appropriate count
    const cloudCount = (w === 'cloudy' || w === 'rainy' || w === 'stormy') ? 14 : 6;
    if (clouds.length !== cloudCount) {
      clouds.length = 0;
      for (let i = 0; i < cloudCount; i++) {
        clouds.push({
          x: Math.random() * width,
          y: 40 + Math.random() * (height * 0.4),
          scale: 1.2 + Math.random() * 1.4,
          speed: 8 + Math.random() * 18,
          puffs: 3 + Math.floor(Math.random() * 3),
        });
      }
    }
  }

  document.querySelectorAll('#weather button').forEach(btn => {
    btn.addEventListener('click', () => setWeather(btn.dataset.w));
  });

  function weatherSkyTint(top, bot) {
    switch (weather) {
      case 'cloudy':
        return {
          top: lerpC(top, [165, 175, 190], 0.4),
          bot: lerpC(bot, [200, 205, 215], 0.4),
        };
      case 'rainy':
        return {
          top: lerpC(top, [85, 95, 115], 0.6),
          bot: lerpC(bot, [125, 135, 150], 0.55),
        };
      case 'stormy':
        return {
          top: lerpC(top, [40, 45, 60], 0.75),
          bot: lerpC(bot, [70, 75, 90], 0.7),
        };
      case 'snowy':
        return {
          top: lerpC(top, [180, 195, 215], 0.55),
          bot: lerpC(bot, [225, 230, 240], 0.55),
        };
      case 'foggy':
        return {
          top: lerpC(top, [215, 220, 225], 0.55),
          bot: lerpC(bot, [225, 228, 232], 0.55),
        };
      default:
        return { top, bot };
    }
  }

  function celestialHidden() {
    return weather === 'rainy' || weather === 'stormy' || weather === 'foggy';
  }

  function drawWeather(now, dt) {
    // Rain
    if (weather === 'rainy' || weather === 'stormy') {
      const heavy = weather === 'stormy';
      const speedMul = heavy ? 1.3 : 1.0;
      const angle = heavy ? 0.25 : 0.15;
      ctx.strokeStyle = heavy ? 'rgba(170, 190, 220, 0.75)' : 'rgba(180, 200, 230, 0.6)';
      ctx.lineWidth = heavy ? 1.4 : 1;
      ctx.lineCap = 'round';
      ctx.beginPath();
      for (const d of rainDrops) {
        d.y += d.speed * dt * speedMul;
        d.x -= d.speed * dt * angle;
        if (d.y > height) {
          d.y = -d.len;
          d.x = Math.random() * (width + 200) - 100;
        } else if (d.x < -50) {
          d.x = width + 20;
        }
        ctx.moveTo(d.x, d.y);
        ctx.lineTo(d.x + d.len * angle, d.y + d.len);
      }
      ctx.stroke();
    }

    // Snow
    if (weather === 'snowy') {
      for (const s of snowflakes) {
        s.y += s.speed * dt;
        s.phase += dt * 0.8;
        if (s.y > height) {
          s.y = -s.size;
          s.x = Math.random() * width;
        }
        const px = s.x + Math.sin(s.phase * s.drift) * 18;
        ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
        ctx.beginPath();
        ctx.arc(px, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Lightning (stormy) — zigzag bolt + glow + screen flash, with a brief flicker
    if (weather === 'stormy') {
      if (now > lightningNext) {
        lightningStart = now;
        lightningEnd = now + 320 + Math.random() * 180;
        lightningNext = now + 2000 + Math.random() * 4500;
        lightningBolt = generateBolt();
      }
      if (now < lightningEnd && lightningBolt) {
        const total = lightningEnd - lightningStart;
        const elapsed = now - lightningStart;
        const t = elapsed / total; // 0..1
        // Quick attack, slow decay — peak alpha at t≈0.1, fades to 0
        let envelope;
        if (t < 0.1) {
          envelope = t / 0.1;
        } else {
          envelope = Math.pow(1 - (t - 0.1) / 0.9, 1.8);
        }
        // Flicker: a couple of sub-strobes during the decay
        const flicker = 0.7 + 0.3 * Math.abs(Math.sin(elapsed * 0.06));
        const a = Math.max(0, Math.min(1, envelope * flicker));

        // Screen flash (cooler-tinted than before so it reads as lightning)
        ctx.fillStyle = `rgba(235, 240, 255, ${a * 0.55})`;
        ctx.fillRect(0, 0, width, height);

        // Bolt on top of the flash
        drawLightningBolt(lightningBolt, a);
      } else if (now >= lightningEnd) {
        lightningBolt = null;
      }
    }

    // Fog overlay
    if (weather === 'foggy') {
      const fog = ctx.createLinearGradient(0, 0, 0, height);
      fog.addColorStop(0, 'rgba(230, 232, 235, 0.35)');
      fog.addColorStop(0.5, 'rgba(220, 222, 225, 0.55)');
      fog.addColorStop(1, 'rgba(210, 212, 215, 0.7)');
      ctx.fillStyle = fog;
      ctx.fillRect(0, 0, width, height);
    }
  }

  window.addEventListener('resize', () => { spawnClouds(); spawnStars(); spawnGround(); spawnRain(220); spawnSnow(180); });

  let lastFrame = performance.now();
  let currentBrightness = 1; // updated each frame in drawBackground; read by draw() helpers

  function drawBackground(now) {
    const elapsed = (now - startTime) / 1000;
    // start mid-morning so first impression is sunny
    const t = ((elapsed / CYCLE_SECONDS) + 0.35) % 1;

    const baseColors = skyColors(t);
    const { top, bot } = weatherSkyTint(baseColors.top, baseColors.bot);

    // Sky gradient
    const sky = ctx.createLinearGradient(0, 0, 0, height);
    sky.addColorStop(0, rgb(top));
    sky.addColorStop(1, rgb(bot));
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, width, height);

    // Stars — fade in with darkness (use top color brightness)
    const brightness = (top[0] + top[1] + top[2]) / (3 * 255);
    currentBrightness = brightness;
    const starAlpha = Math.max(0, 1 - brightness * 2.5);
    if (starAlpha > 0.01) {
      for (const s of stars) {
        const twinkle = 0.5 + 0.5 * Math.sin(now / 400 + s.phase);
        ctx.fillStyle = `rgba(255, 255, 230, ${starAlpha * twinkle})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Sun arc — visible roughly 0.22..0.78 (hidden in bad weather)
    const horizon = height * 0.82;
    if (t > 0.22 && t < 0.78 && !celestialHidden()) {
      const n = (t - 0.22) / 0.56;
      const sunX = lerp(60, width - 60, n);
      const sunY = horizon - Math.sin(Math.PI * n) * (horizon - 70);
      const sunR = 38;

      // glow
      const glow = ctx.createRadialGradient(sunX, sunY, sunR * 0.5, sunX, sunY, sunR * 4);
      glow.addColorStop(0, 'rgba(255, 240, 180, 0.55)');
      glow.addColorStop(1, 'rgba(255, 240, 180, 0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(sunX, sunY, sunR * 4, 0, Math.PI * 2);
      ctx.fill();

      // sun disc — warmer near horizon
      const nearHorizon = Math.min(1, Math.abs(n - 0.5) * 2);
      const sunCore = lerpC([255, 250, 220], [255, 160, 80], nearHorizon);
      ctx.fillStyle = rgb(sunCore);
      ctx.beginPath();
      ctx.arc(sunX, sunY, sunR, 0, Math.PI * 2);
      ctx.fill();
    }

    // Moon — opposite side of the cycle (night phase) (hidden in bad weather)
    const moonRaw = ((t - 0.78) + 1) % 1; // 0 at moonrise (t=0.78), 1 at moonset (t=0.22 next day, span 0.44)
    if (moonRaw < 0.44 && !celestialHidden()) {
      const n = moonRaw / 0.44;
      const moonX = lerp(60, width - 60, n);
      const moonY = horizon - Math.sin(Math.PI * n) * (horizon - 70);
      const moonR = 28;

      const glow = ctx.createRadialGradient(moonX, moonY, moonR * 0.5, moonX, moonY, moonR * 3);
      glow.addColorStop(0, `rgba(220, 230, 255, ${0.4 * starAlpha})`);
      glow.addColorStop(1, 'rgba(220, 230, 255, 0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(moonX, moonY, moonR * 3, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#f5f3e8';
      ctx.beginPath();
      ctx.arc(moonX, moonY, moonR, 0, Math.PI * 2);
      ctx.fill();
      // craters
      ctx.fillStyle = 'rgba(180, 175, 160, 0.6)';
      ctx.beginPath();
      ctx.arc(moonX - 8, moonY - 6, 4, 0, Math.PI * 2);
      ctx.arc(moonX + 6, moonY + 4, 3, 0, Math.PI * 2);
      ctx.arc(moonX + 2, moonY - 10, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Clouds — tint slightly with sky color at sunset
    const dt = (now - lastFrame) / 1000;
    // Cloud color depends on weather
    let cloudTint, cloudAlpha;
    switch (weather) {
      case 'rainy':
        cloudTint = lerpC([120, 130, 145], bot, 0.15);
        cloudAlpha = 0.88;
        break;
      case 'stormy':
        cloudTint = lerpC([55, 60, 75], bot, 0.1);
        cloudAlpha = 0.92;
        break;
      case 'snowy':
        cloudTint = lerpC([200, 205, 215], bot, 0.15);
        cloudAlpha = 0.85;
        break;
      case 'cloudy':
        cloudTint = lerpC([225, 228, 232], bot, 0.2);
        cloudAlpha = 0.85;
        break;
      default:
        cloudTint = lerpC([255, 255, 255], bot, 0.3);
        cloudAlpha = 0.65 + 0.25 * brightness;
    }
    for (const c of clouds) {
      c.x += c.speed * dt;
      if (c.x - 100 * c.scale > width) c.x = -100 * c.scale;
      drawCloud(c.x, c.y, c.scale, c.puffs, cloudTint, cloudAlpha);
    }

    // Ground / grass base
    const grassTop = lerpC([90, 170, 80], [20, 40, 30], 1 - brightness);
    const grassBot = lerpC([50, 110, 50], [10, 25, 15], 1 - brightness);
    const grad = ctx.createLinearGradient(0, horizon, 0, height);
    grad.addColorStop(0, rgb(grassTop));
    grad.addColorStop(1, rgb(grassBot));
    ctx.fillStyle = grad;
    ctx.fillRect(0, horizon, width, height - horizon);

    // Bench (drawn before grass so blades poke up in front of legs)
    for (const b of ground.benches) {
      drawUmbrella(b, brightness);
      drawBench(b, brightness);
      if (isSitting && (weather === 'rainy' || weather === 'stormy')) {
        drawFoldedUmbrella(b.x + 50, b.y - 62, 0.18, brightness);
      }
    }

    // Grass blades — sway gently with time
    const bladeColor = lerpC([60, 140, 65], [10, 30, 20], 1 - brightness);
    const bladeTip   = lerpC([130, 200, 110], [25, 55, 35], 1 - brightness);
    ctx.lineCap = 'round';
    ctx.lineWidth = 1.5;
    for (const g of ground.grass) {
      const sway = Math.sin(now / 1500 + g.phase) * 0.25;
      const tipX = g.x + (g.lean + sway) * g.h;
      const tipY = g.y - g.h;
      const c = [
        Math.floor(lerp(bladeColor[0], bladeTip[0], 0.4) * g.shade),
        Math.floor(lerp(bladeColor[1], bladeTip[1], 0.4) * g.shade),
        Math.floor(lerp(bladeColor[2], bladeTip[2], 0.4) * g.shade),
      ];
      ctx.strokeStyle = rgb(c);
      ctx.beginPath();
      ctx.moveTo(g.x, g.y);
      ctx.quadraticCurveTo(g.x + (g.lean + sway) * g.h * 0.4, g.y - g.h * 0.5, tipX, tipY);
      ctx.stroke();
    }

    // Flowers — stem + 5 petals + center
    const stemColor = lerpC([34, 130, 50], [10, 30, 14], 1 - brightness);
    const centerColor = lerpC([253, 224, 71], [50, 40, 14], 1 - brightness);
    for (const f of ground.flowers) {
      ctx.strokeStyle = rgb(stemColor);
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(f.x, f.y);
      ctx.lineTo(f.x, f.y - f.stemH);
      ctx.stroke();

      const petalColor = lerpC(f.color, [30, 30, 50], 1 - brightness);
      ctx.fillStyle = rgb(petalColor);
      const cyF = f.y - f.stemH;
      for (let p = 0; p < 5; p++) {
        const a = (p / 5) * Math.PI * 2 - Math.PI / 2;
        ctx.beginPath();
        ctx.arc(f.x + Math.cos(a) * f.size, cyF + Math.sin(a) * f.size, f.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = rgb(centerColor);
      ctx.beginPath();
      ctx.arc(f.x, cyF, f.size * 0.55, 0, Math.PI * 2);
      ctx.fill();
    }

    // Accumulation effects on the ground (after grass/flowers so they appear under)
    drawSnowGround();
    drawPuddles();

    // update clock
    const hours = Math.floor(t * 24);
    const minutes = Math.floor((t * 24 * 60) % 60);
    clockEl.textContent = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
  }

  function drawCloud(x, y, scale, puffs, tint, alpha) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scale, scale);
    ctx.globalAlpha = alpha;

    // soft shadow under cloud
    ctx.fillStyle = rgb(lerpC(tint, [120, 130, 150], 0.3), 0.6);
    for (let i = 0; i < puffs; i++) {
      ctx.beginPath();
      ctx.arc(i * 22 - puffs * 8, 6, 18, 0, Math.PI * 2);
      ctx.fill();
    }

    // body
    ctx.fillStyle = rgb(tint);
    ctx.beginPath();
    ctx.arc(0, 0, 22, 0, Math.PI * 2);
    for (let i = 1; i < puffs; i++) {
      ctx.arc(i * 20, -2 + (i % 2) * 4, 18 - (i % 2) * 2, 0, Math.PI * 2);
    }
    ctx.arc(puffs * 20 - 4, 4, 16, 0, Math.PI * 2);
    ctx.fill();

    // highlight
    ctx.fillStyle = rgb(lerpC(tint, [255, 255, 255], 0.5), 0.9);
    ctx.beginPath();
    ctx.arc(-4, -6, 10, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
    ctx.globalAlpha = 1;
  }

  function groundY() {
    return height * 0.82 - ellipse.ry * 0.95;
  }
  // When sitting, her hip lines up with the bench seat top
  function seatY() {
    // Must match seatTopY inside drawBench (currently -62)
    const bench = ground.benches[0];
    return bench.y - 62 - ellipse.ry * 0.25;
  }

  let isSitting = false;

  // Start her seated on the bench
  ellipse.x = ground.benches[0].x;
  isSitting = true;
  ellipse.y = seatY();

  function step() {
    checkDayNightTransition();
    const dx = ellipse.x - mouse.x;
    const dy = ellipse.y - mouse.y;
    const dist = Math.hypot(dx, dy);
    const scared = dist < FEAR_RADIUS;
    const bench = ground.benches[0];
    const wet = weather === 'rainy' || weather === 'stormy';
    const canFly = mode === 'angel' && !wet;
    const canTeleport = mode === 'vampire';

    if (canTeleport) {
      // ---- Vampire: teleport away when threatened ----
      isSitting = false;
      const now = performance.now();
      if (scared && now > teleportCooldown) {
        // Pick a random spot well away from the cursor and inside the sky
        const skyFloor = height * 0.82 - ellipse.ry * 0.5;
        let nx, ny;
        for (let attempt = 0; attempt < 12; attempt++) {
          nx = ellipse.rx + Math.random() * (width - 2 * ellipse.rx);
          ny = ellipse.ry + Math.random() * (skyFloor - ellipse.ry);
          if (Math.hypot(nx - mouse.x, ny - mouse.y) > FEAR_RADIUS * 1.4) break;
        }
        // Spawn poofs at old and new positions
        poofs.push({ x: ellipse.x, y: ellipse.y, born: now, duration: 450 });
        poofs.push({ x: nx,         y: ny,         born: now, duration: 450 });
        ellipse.x = nx;
        ellipse.y = ny;
        ellipse.vx = 0;
        ellipse.vy = 0;
        teleportCooldown = now + 450;
      } else {
        // Subtle hover when not threatened
        ellipse.vy += Math.sin(now / 700) * 0.07;
        ellipse.vx *= FRICTION;
        ellipse.vy *= FRICTION;
        ellipse.x += ellipse.vx;
        ellipse.y += ellipse.vy;
      }
      // Soft clamp inside the canvas
      const skyFloor = height * 0.82 - ellipse.ry * 0.5;
      if (ellipse.x < ellipse.rx)         { ellipse.x = ellipse.rx;         ellipse.vx = 0; }
      if (ellipse.x > width - ellipse.rx) { ellipse.x = width - ellipse.rx; ellipse.vx = 0; }
      if (ellipse.y < ellipse.ry)         { ellipse.y = ellipse.ry;         ellipse.vy = 0; }
      if (ellipse.y > skyFloor)           { ellipse.y = skyFloor;           ellipse.vy = 0; }
    } else if (canFly) {
      // ---- Angel flying: free 2D movement ----
      isSitting = false;
      if (scared && dist > 0.001) {
        const strength = (1 - dist / FEAR_RADIUS) * 2.5;
        ellipse.vx += (dx / dist) * strength;
        ellipse.vy += (dy / dist) * strength;
      } else {
        // Gentle hover bob when not chased
        ellipse.vy += Math.sin(performance.now() / 600) * 0.08;
      }

      ellipse.vx *= FRICTION;
      ellipse.vy *= FRICTION;

      const speed = Math.hypot(ellipse.vx, ellipse.vy);
      if (speed > MAX_SPEED) {
        ellipse.vx = (ellipse.vx / speed) * MAX_SPEED;
        ellipse.vy = (ellipse.vy / speed) * MAX_SPEED;
      }

      ellipse.x += ellipse.vx;
      ellipse.y += ellipse.vy;

      // Bounce off all four sides (top, bottom-of-sky, left, right)
      const skyFloor = height * 0.82 - ellipse.ry * 0.5; // can't fly through the ground
      if (ellipse.x < ellipse.rx)         { ellipse.x = ellipse.rx;         ellipse.vx *= -0.6; }
      if (ellipse.x > width - ellipse.rx) { ellipse.x = width - ellipse.rx; ellipse.vx *= -0.6; }
      if (ellipse.y < ellipse.ry)         { ellipse.y = ellipse.ry;         ellipse.vy *= -0.6; }
      if (ellipse.y > skyFloor)           { ellipse.y = skyFloor;           ellipse.vy *= -0.6; }
    } else {
      // ---- Grounded behavior (normal mode, or angel with wet wings) ----
      if (scared) {
        isSitting = false;
        if (dist > 0.001) {
          const strength = (1 - dist / FEAR_RADIUS) * 2.5;
          ellipse.vx += (dx / dist) * strength;
        }
      } else if (isSitting) {
        ellipse.vx *= 0.4;
      } else {
        const offset = ellipse.x - bench.x;
        if (Math.abs(offset) < 4) {
          isSitting = true;
          ellipse.x = bench.x;
          ellipse.vx = 0;
        } else {
          ellipse.vx += -Math.sign(offset) * 0.25;
        }
      }

      ellipse.vx *= FRICTION;
      if (Math.abs(ellipse.vx) > MAX_SPEED) {
        ellipse.vx = Math.sign(ellipse.vx) * MAX_SPEED;
      }
      ellipse.x += ellipse.vx;

      if (ellipse.x < ellipse.rx)         { ellipse.x = ellipse.rx;         ellipse.vx *= -0.6; isSitting = false; }
      if (ellipse.x > width - ellipse.rx) { ellipse.x = width - ellipse.rx; ellipse.vx *= -0.6; isSitting = false; }

      ellipse.vy = 0;
      ellipse.y = isSitting ? seatY() : groundY();
    }

    draw(dist);
    requestAnimationFrame(step);
  }

  function draw(distToMouse) {
    const now = performance.now();
    const dt = Math.min(0.1, (now - lastFrame) / 1000);
    updateAccumulation(dt);
    drawBackground(now);

    const scared = distToMouse < FEAR_RADIUS;
    const cx = ellipse.x;
    const cy = ellipse.y;
    const ry = ellipse.ry;

    // Body anchor points (relative to center cy)
    const headR = 38;
    const headY = cy - ry * 0.62;
    const neckY = headY + headR * 0.85;
    const shoulderY = cy - ry * 0.32;
    const waistY = cy - ry * 0.05;
    const hipY = cy + ry * 0.25;
    const kneeY = cy + ry * 0.6;
    const footY = cy + ry * 0.95;

    // Look direction
    let lookX = 0, lookY = 0;
    if (scared && distToMouse > 0.001) {
      lookX = (cx - mouse.x) / distToMouse;
      lookY = (cy - mouse.y) / distToMouse;
    }

    // Run animation phase — faster cycle when scared
    const speed = Math.hypot(ellipse.vx, ellipse.vy);
    const speedAbs = Math.abs(ellipse.vx);
    const walking = !isSitting && !scared && speedAbs > 0.4;
    const phase = Date.now() / (scared ? 70 : walking ? 160 : 400);
    const swing = Math.sin(phase) * (scared ? 0.55 : walking ? 0.25 : 0.1);

    // Direction she's running (for leaning)
    const moveDir = speed > 0.5 ? Math.atan2(ellipse.vy, ellipse.vx) : 0;
    const lean = scared ? Math.cos(moveDir) * 0.08 : 0;

    const SKIN = '#f4c2a1';
    const SKIN_LIGHT = '#ffe4d6';
    const HAIR = '#15101f';
    const dressDef = currentDress();
    const DRESS = dressDef.normal;
    const DRESS_DARK = dressDef.dark;
    const BOW = dressDef.bow;

    // ---- Back hair (long, flowing past the shoulders) ----
    ctx.fillStyle = HAIR;
    ctx.beginPath();
    ctx.moveTo(cx - headR * 1.0, headY - headR * 0.2);
    ctx.quadraticCurveTo(cx - headR * 1.08, headY - headR * 1.08, cx, headY - headR * 1.12);
    ctx.quadraticCurveTo(cx + headR * 1.08, headY - headR * 1.08, cx + headR * 1.0, headY - headR * 0.2);
    // Right side cascading down past the shoulder
    ctx.bezierCurveTo(
      cx + headR * 1.18, shoulderY,
      cx + headR * 1.05, shoulderY + 55,
      cx + headR * 0.75, shoulderY + 80
    );
    // Across the back (V-shape at the bottom)
    ctx.quadraticCurveTo(cx, shoulderY + 95, cx - headR * 0.75, shoulderY + 80);
    // Left side cascading back up
    ctx.bezierCurveTo(
      cx - headR * 1.05, shoulderY + 55,
      cx - headR * 1.18, shoulderY,
      cx - headR * 1.0, headY - headR * 0.2
    );
    ctx.closePath();
    ctx.fill();

    // ---- Wings (behind body, in front of back hair) ----
    if (mode === 'angel') {
      const wet = weather === 'rainy' || weather === 'stormy';
      const flapPhase = Math.sin(performance.now() / 220);
      drawWing(cx, shoulderY, -1, wet, flapPhase);
      drawWing(cx, shoulderY,  1, wet, flapPhase);
    } else if (mode === 'vampire') {
      const flapPhase = Math.sin(performance.now() / 180);
      drawBatWing(cx, shoulderY, -1, flapPhase);
      drawBatWing(cx, shoulderY,  1, flapPhase);
    }

    // ---- Leg path coords (shared between skin legs, pants overlay, and shoes) ----
    const groundLevel = height * 0.82;
    let legGeom;
    if (isSitting) {
      // Longer thigh segment so seated pants/shorts read like real garments instead of stubs
      const kneeY_sit = hipY + 30;
      legGeom = {
        sitting: true,
        kneeY_sit,
        kneeX_L: cx - 6,
        kneeX_R: cx + 6,
        shoeLX: cx - 7,
        shoeRX: cx + 7,
        shoeY: groundLevel,
      };
    } else {
      // Keep feet on their own sides: clamp swing so they never cross past center
      const swingAmp = scared ? 6 : walking ? 4 : 1;
      const legSwing = Math.sin(phase) * swingAmp;
      legGeom = {
        sitting: false,
        kneeY,
        leftFootX: cx - 12 + legSwing,
        rightFootX: cx + 12 + legSwing, // both feet shift together (subtle gait, no crossing)
        footY,
        shoeY: footY,
        shoeLX: cx - 12 + legSwing,
        shoeRX: cx + 12 + legSwing,
      };
    }

    function strokeLegPath(color, lineW) {
      ctx.strokeStyle = color;
      ctx.lineWidth = lineW;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      if (legGeom.sitting) {
        ctx.beginPath();
        ctx.moveTo(cx - 12, hipY);
        ctx.lineTo(legGeom.kneeX_L, legGeom.kneeY_sit);
        ctx.lineTo(legGeom.kneeX_L, groundLevel);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx + 12, hipY);
        ctx.lineTo(legGeom.kneeX_R, legGeom.kneeY_sit);
        ctx.lineTo(legGeom.kneeX_R, groundLevel);
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.moveTo(cx - 12, hipY);
        ctx.quadraticCurveTo(cx - 14, legGeom.kneeY, legGeom.leftFootX, legGeom.footY);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx + 12, hipY);
        ctx.quadraticCurveTo(cx + 14, legGeom.kneeY, legGeom.rightFootX, legGeom.footY);
        ctx.stroke();
      }
    }

    // Skin legs (base layer; pants will overlay this for some outfits)
    strokeLegPath(SKIN, 11);

    // ---- Torso skin (chest -> midriff -> hips; covers the abdomen for every outfit) ----
    ctx.fillStyle = SKIN;
    ctx.beginPath();
    ctx.moveTo(cx - 6, neckY);
    ctx.quadraticCurveTo(cx - 20, shoulderY - 2, cx - 22, shoulderY + 6);
    ctx.quadraticCurveTo(cx - 24, waistY, cx - 20, waistY + 2);
    ctx.quadraticCurveTo(cx - 22, hipY - 8, cx - 20, hipY + 6);
    ctx.lineTo(cx + 20, hipY + 6);
    ctx.quadraticCurveTo(cx + 22, hipY - 8, cx + 20, waistY + 2);
    ctx.quadraticCurveTo(cx + 24, waistY, cx + 22, shoulderY + 6);
    ctx.quadraticCurveTo(cx + 20, shoulderY - 2, cx + 6, neckY);
    ctx.closePath();
    ctx.fill();

    // ---- Outfit ----
    const outfit = currentOutfitType();

    // Helper: bell-shaped skirt (skirtBottom > skirtTop)
    function drawBellSkirt(skirtBottomY, hemSpread, color, colorDark) {
      const skirtTopY = waistY;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(cx - 22, skirtTopY);
      ctx.lineTo(cx + 22, skirtTopY);
      ctx.lineTo(cx + hemSpread, skirtBottomY);
      ctx.quadraticCurveTo(cx, skirtBottomY + 8, cx - hemSpread, skirtBottomY);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = colorDark;
      ctx.beginPath();
      ctx.moveTo(cx - hemSpread, skirtBottomY);
      ctx.quadraticCurveTo(cx, skirtBottomY + 8, cx + hemSpread, skirtBottomY);
      ctx.quadraticCurveTo(cx + hemSpread - 2, skirtBottomY + 5, cx + hemSpread - 4, skirtBottomY + 2);
      ctx.quadraticCurveTo(cx, skirtBottomY + 10, cx - hemSpread + 4, skirtBottomY + 2);
      ctx.quadraticCurveTo(cx - hemSpread + 2, skirtBottomY + 5, cx - hemSpread, skirtBottomY);
      ctx.closePath();
      ctx.fill();
    }

    function drawFittedBodice(color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(cx - 18, shoulderY);
      ctx.quadraticCurveTo(cx - 26, waistY - 10, cx - 22, waistY);
      ctx.lineTo(cx + 22, waistY);
      ctx.quadraticCurveTo(cx + 26, waistY - 10, cx + 18, shoulderY);
      ctx.closePath();
      ctx.fill();
    }

    function drawWhiteCollarHalf() {
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.ellipse(cx, shoulderY, 14, 5, 0, 0, Math.PI);
      ctx.fill();
    }

    switch (outfit) {
      case 'bell': {
        drawBellSkirt(hipY + 18, 46, DRESS, DRESS_DARK);
        drawFittedBodice(DRESS);
        drawWhiteCollarHalf();
        break;
      }

      case 'gown': {
        // Floor-length straight gown — sitting collapses footY past the ground,
        // so clamp the hem to the actual ground level when seated.
        const hem = (isSitting ? groundLevel : footY) - 4;
        const top = waistY;
        ctx.fillStyle = DRESS;
        ctx.beginPath();
        ctx.moveTo(cx - 22, top);
        ctx.quadraticCurveTo(cx - 28, (top + hem) / 2, cx - 34, hem);
        ctx.quadraticCurveTo(cx, hem + 6, cx + 34, hem);
        ctx.quadraticCurveTo(cx + 28, (top + hem) / 2, cx + 22, top);
        ctx.closePath();
        ctx.fill();
        // hem shadow
        ctx.fillStyle = DRESS_DARK;
        ctx.beginPath();
        ctx.moveTo(cx - 34, hem);
        ctx.quadraticCurveTo(cx, hem + 6, cx + 34, hem);
        ctx.quadraticCurveTo(cx, hem + 2, cx - 34, hem);
        ctx.closePath();
        ctx.fill();
        drawFittedBodice(DRESS);
        // sweetheart neckline trim
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.moveTo(cx - 14, shoulderY);
        ctx.quadraticCurveTo(cx, shoulderY + 8, cx + 14, shoulderY);
        ctx.quadraticCurveTo(cx + 12, shoulderY - 2, cx - 12, shoulderY - 2);
        ctx.closePath();
        ctx.fill();
        break;
      }

      case 'sundress': {
        drawBellSkirt(hipY + 14, 42, DRESS, DRESS_DARK);
        // Bodice sits below the shoulders, leaving shoulders bare
        const bodTop = shoulderY + 10;
        ctx.fillStyle = DRESS;
        ctx.beginPath();
        ctx.moveTo(cx - 20, bodTop);
        ctx.quadraticCurveTo(cx - 24, waistY - 6, cx - 22, waistY);
        ctx.lineTo(cx + 22, waistY);
        ctx.quadraticCurveTo(cx + 24, waistY - 6, cx + 20, bodTop);
        ctx.quadraticCurveTo(cx, bodTop + 4, cx - 20, bodTop);
        ctx.closePath();
        ctx.fill();
        // Thin straps
        ctx.strokeStyle = DRESS;
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(cx - 14, bodTop);
        ctx.lineTo(cx - 14, shoulderY);
        ctx.moveTo(cx + 14, bodTop);
        ctx.lineTo(cx + 14, shoulderY);
        ctx.stroke();
        break;
      }

      case 'tee-skirt': {
        // Pleated mini skirt (short, with vertical pleat lines)
        const skirtBottomY = hipY + 12;
        ctx.fillStyle = DRESS_DARK;
        ctx.beginPath();
        ctx.moveTo(cx - 22, waistY);
        ctx.lineTo(cx + 22, waistY);
        ctx.lineTo(cx + 38, skirtBottomY);
        ctx.lineTo(cx - 38, skirtBottomY);
        ctx.closePath();
        ctx.fill();
        // pleat lines
        ctx.strokeStyle = DRESS;
        ctx.lineWidth = 1.5;
        for (let i = -2; i <= 2; i++) {
          const topX = cx + i * 9;
          const botX = cx + i * 15;
          ctx.beginPath();
          ctx.moveTo(topX, waistY + 2);
          ctx.lineTo(botX, skirtBottomY);
          ctx.stroke();
        }
        // Tee: rounded boxy shape from neck to waist with short sleeves
        ctx.fillStyle = DRESS;
        ctx.beginPath();
        ctx.moveTo(cx - 24, shoulderY + 2);
        ctx.quadraticCurveTo(cx - 26, waistY - 4, cx - 24, waistY + 2);
        ctx.lineTo(cx + 24, waistY + 2);
        ctx.quadraticCurveTo(cx + 26, waistY - 4, cx + 24, shoulderY + 2);
        ctx.quadraticCurveTo(cx, shoulderY - 4, cx - 24, shoulderY + 2);
        ctx.closePath();
        ctx.fill();
        // Short sleeves
        ctx.beginPath();
        ctx.ellipse(cx - 22, shoulderY + 6, 9, 8, 0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(cx + 22, shoulderY + 6, 9, 8, -0.3, 0, Math.PI * 2);
        ctx.fill();
        // round neckline
        ctx.fillStyle = SKIN;
        ctx.beginPath();
        ctx.ellipse(cx, shoulderY + 2, 8, 4, 0, 0, Math.PI);
        ctx.fill();
        break;
      }

      case 'overalls': {
        // Long pants over legs (denim color uses DRESS as the dye)
        strokeLegPath(DRESS, 18);
        // Bib + waistband: chest panel that extends down to meet the pants at the hips
        ctx.fillStyle = DRESS;
        ctx.beginPath();
        ctx.moveTo(cx - 16, shoulderY + 12);
        ctx.lineTo(cx + 16, shoulderY + 12);
        ctx.lineTo(cx + 22, waistY + 2);
        ctx.lineTo(cx + 20, hipY + 4);
        ctx.lineTo(cx - 20, hipY + 4);
        ctx.lineTo(cx - 22, waistY + 2);
        ctx.closePath();
        ctx.fill();
        // Darker waistband stripe where the bib meets the pants
        ctx.fillStyle = DRESS_DARK;
        ctx.fillRect(cx - 20, hipY, 40, 4);
        // Two straps from bib to shoulders
        ctx.strokeStyle = DRESS;
        ctx.lineWidth = 5;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(cx - 11, shoulderY + 12);
        ctx.lineTo(cx - 13, shoulderY - 2);
        ctx.moveTo(cx + 11, shoulderY + 12);
        ctx.lineTo(cx + 13, shoulderY - 2);
        ctx.stroke();
        // Button accents
        ctx.fillStyle = '#fde047';
        ctx.beginPath();
        ctx.arc(cx - 11, shoulderY + 13, 2, 0, Math.PI * 2);
        ctx.arc(cx + 11, shoulderY + 13, 2, 0, Math.PI * 2);
        ctx.fill();
        // White tee peeking out under the bib
        ctx.fillStyle = '#f3f4f6';
        ctx.beginPath();
        ctx.moveTo(cx - 22, shoulderY + 2);
        ctx.lineTo(cx + 22, shoulderY + 2);
        ctx.lineTo(cx + 22, shoulderY + 12);
        ctx.lineTo(cx - 22, shoulderY + 12);
        ctx.closePath();
        ctx.fill();
        break;
      }

      case 'shorts-tank': {
        // Shorts: pants overlay that only reaches mid-thigh
        ctx.strokeStyle = DRESS_DARK;
        ctx.lineWidth = 18;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        if (legGeom.sitting) {
          ctx.beginPath();
          ctx.moveTo(cx - 12, hipY);
          ctx.lineTo(legGeom.kneeX_L, legGeom.kneeY_sit);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(cx + 12, hipY);
          ctx.lineTo(legGeom.kneeX_R, legGeom.kneeY_sit);
          ctx.stroke();
        } else {
          // Up to roughly knee
          ctx.beginPath();
          ctx.moveTo(cx - 12, hipY);
          ctx.quadraticCurveTo(cx - 14, legGeom.kneeY - 4, cx - 13, legGeom.kneeY - 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(cx + 12, hipY);
          ctx.quadraticCurveTo(cx + 14, legGeom.kneeY - 4, cx + 13, legGeom.kneeY - 2);
          ctx.stroke();
        }
        // Tank top (DRESS color), narrower armholes
        ctx.fillStyle = DRESS;
        ctx.beginPath();
        ctx.moveTo(cx - 14, shoulderY + 2);
        ctx.quadraticCurveTo(cx - 22, waistY - 8, cx - 22, waistY + 2);
        ctx.lineTo(cx + 22, waistY + 2);
        ctx.quadraticCurveTo(cx + 22, waistY - 8, cx + 14, shoulderY + 2);
        ctx.quadraticCurveTo(cx, shoulderY + 8, cx - 14, shoulderY + 2);
        ctx.closePath();
        ctx.fill();
        break;
      }

      case 'polka': {
        drawBellSkirt(hipY + 18, 46, DRESS, DRESS_DARK);
        drawFittedBodice(DRESS);
        drawWhiteCollarHalf();
        // White polka dots scattered across bodice + skirt
        ctx.fillStyle = '#ffffff';
        const dots = [
          [-12, shoulderY + 10], [10, waistY - 14], [-6, waistY - 4],
          [-30, hipY + 4], [-10, hipY + 8], [12, hipY + 2], [30, hipY + 8],
          [-22, hipY + 22], [4, hipY + 18], [24, hipY + 22],
        ];
        for (const [dx, dy] of dots) {
          ctx.beginPath();
          ctx.arc(cx + dx, dy, 3, 0, Math.PI * 2);
          ctx.fill();
        }
        break;
      }

      case 'sailor': {
        // Pleated skirt
        const skirtBottomY = hipY + 22;
        ctx.fillStyle = DRESS;
        ctx.beginPath();
        ctx.moveTo(cx - 22, waistY);
        ctx.lineTo(cx + 22, waistY);
        ctx.lineTo(cx + 44, skirtBottomY);
        ctx.lineTo(cx - 44, skirtBottomY);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = DRESS_DARK;
        ctx.lineWidth = 1.5;
        for (let i = -3; i <= 3; i++) {
          const topX = cx + i * 7;
          const botX = cx + i * 14;
          ctx.beginPath();
          ctx.moveTo(topX, waistY + 2);
          ctx.lineTo(botX, skirtBottomY);
          ctx.stroke();
        }
        // Bodice
        drawFittedBodice(DRESS);
        // Sailor collar (square back + V at front)
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.moveTo(cx - 22, shoulderY + 2);
        ctx.lineTo(cx + 22, shoulderY + 2);
        ctx.lineTo(cx + 18, shoulderY + 12);
        ctx.lineTo(cx, shoulderY + 22);
        ctx.lineTo(cx - 18, shoulderY + 12);
        ctx.closePath();
        ctx.fill();
        // Tie under V
        ctx.fillStyle = DRESS_DARK;
        ctx.beginPath();
        ctx.moveTo(cx - 4, shoulderY + 20);
        ctx.lineTo(cx + 4, shoulderY + 20);
        ctx.lineTo(cx + 2, shoulderY + 28);
        ctx.lineTo(cx - 2, shoulderY + 28);
        ctx.closePath();
        ctx.fill();
        // Two stripes on collar edge
        ctx.strokeStyle = DRESS;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(cx - 20, shoulderY + 4);
        ctx.lineTo(cx + 20, shoulderY + 4);
        ctx.moveTo(cx - 20, shoulderY + 7);
        ctx.lineTo(cx + 20, shoulderY + 7);
        ctx.stroke();
        break;
      }

      default: {
        drawBellSkirt(hipY + 18, 46, DRESS, DRESS_DARK);
        drawFittedBodice(DRESS);
        drawWhiteCollarHalf();
      }
    }

    // Shoes drawn last so pants/skirt don't cover them
    ctx.fillStyle = '#7c2d12';
    ctx.beginPath();
    ctx.ellipse(legGeom.shoeLX, legGeom.shoeY + 2, 10, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(legGeom.shoeRX, legGeom.shoeY + 2, 10, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    // ---- Arms ----
    ctx.strokeStyle = SKIN;
    ctx.lineWidth = 9;
    ctx.lineCap = 'round';

    const lShoulderX = cx - 18;
    const rShoulderX = cx + 18;
    let lHandX, lHandY, rHandX, rHandY;

    const holdingUmbrella = !isSitting && (weather === 'rainy' || weather === 'stormy');
    // Where her right hand grips the portable umbrella handle (near her head, on her right side)
    const umbHandX = cx + 22;
    const umbHandY = headY - 8;

    if (isSitting) {
      // Hands rest on lap, arms relaxed
      lHandX = cx - 16;
      lHandY = hipY + 4;
      rHandX = cx + 16;
      rHandY = hipY + 4;

      ctx.beginPath();
      ctx.moveTo(lShoulderX, shoulderY);
      ctx.quadraticCurveTo(lShoulderX - 8, shoulderY + 22, lHandX, lHandY);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(rShoulderX, shoulderY);
      ctx.quadraticCurveTo(rShoulderX + 8, shoulderY + 22, rHandX, rHandY);
      ctx.stroke();
    } else {
      // when scared, arms fly out wider; idle = relaxed at sides
      const armBase = scared ? Math.PI * 0.55 : Math.PI * 0.5;
      const armSpread = scared ? 0.5 : 0.15;
      const armLen = 48;

      // Left arm (always uses the default swinging/scared logic)
      const lArmAngle = armBase + armSpread + swing;
      const lElbowX = lShoulderX + Math.cos(Math.PI - lArmAngle * 0.6) * armLen * 0.5;
      const lElbowY = shoulderY + Math.sin(lArmAngle * 0.7) * armLen * 0.5;
      lHandX = lShoulderX - Math.sin(lArmAngle) * armLen;
      lHandY = shoulderY + Math.cos(lArmAngle) * armLen;

      ctx.beginPath();
      ctx.moveTo(lShoulderX, shoulderY);
      ctx.quadraticCurveTo(lElbowX, lElbowY, lHandX, lHandY);
      ctx.stroke();

      if (holdingUmbrella) {
        // Right arm reaches up to the umbrella handle anchored above her head
        rHandX = umbHandX;
        rHandY = umbHandY;
        const rElbowX = rShoulderX + 14;
        const rElbowY = (shoulderY + rHandY) / 2 - 4;
        ctx.beginPath();
        ctx.moveTo(rShoulderX, shoulderY);
        ctx.quadraticCurveTo(rElbowX, rElbowY, rHandX, rHandY);
        ctx.stroke();
      } else {
        const rArmAngle = armBase + armSpread - swing;
        const rElbowX = rShoulderX - Math.cos(Math.PI - rArmAngle * 0.6) * armLen * 0.5;
        const rElbowY = shoulderY + Math.sin(rArmAngle * 0.7) * armLen * 0.5;
        rHandX = rShoulderX + Math.sin(rArmAngle) * armLen;
        rHandY = shoulderY + Math.cos(rArmAngle) * armLen;

        ctx.beginPath();
        ctx.moveTo(rShoulderX, shoulderY);
        ctx.quadraticCurveTo(rElbowX, rElbowY, rHandX, rHandY);
        ctx.stroke();
      }
    }

    // Hands
    ctx.fillStyle = SKIN_LIGHT;
    ctx.beginPath();
    ctx.arc(lHandX, lHandY, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(rHandX, rHandY, 6, 0, Math.PI * 2);
    ctx.fill();

    // ---- Neck ----
    ctx.fillStyle = SKIN;
    ctx.fillRect(cx - 6, neckY, 12, shoulderY - neckY + 2);

    // ---- Head (face + front hair, drawn last so they cover neck/shoulders) ----
    // Face
    const skin = ctx.createRadialGradient(cx, headY, headR * 0.2, cx, headY, headR);
    skin.addColorStop(0, SKIN_LIGHT);
    skin.addColorStop(1, SKIN);
    ctx.fillStyle = skin;
    ctx.beginPath();
    ctx.arc(cx, headY, headR, 0, Math.PI * 2);
    ctx.fill();

    // Bangs — center-parted, two side sweeps revealing the forehead
    ctx.fillStyle = HAIR;
    // Left sweep
    ctx.beginPath();
    ctx.moveTo(cx - headR * 0.98, headY - headR * 0.55);
    ctx.quadraticCurveTo(cx - headR * 0.95, headY - headR * 1.05, cx - headR * 0.05, headY - headR * 1.05);
    ctx.quadraticCurveTo(cx - headR * 0.08, headY - headR * 0.75, cx - headR * 0.3, headY - headR * 0.5);
    ctx.quadraticCurveTo(cx - headR * 0.7, headY - headR * 0.4, cx - headR * 0.98, headY - headR * 0.55);
    ctx.closePath();
    ctx.fill();
    // Right sweep (mirror)
    ctx.beginPath();
    ctx.moveTo(cx + headR * 0.98, headY - headR * 0.55);
    ctx.quadraticCurveTo(cx + headR * 0.95, headY - headR * 1.05, cx + headR * 0.05, headY - headR * 1.05);
    ctx.quadraticCurveTo(cx + headR * 0.08, headY - headR * 0.75, cx + headR * 0.3, headY - headR * 0.5);
    ctx.quadraticCurveTo(cx + headR * 0.7, headY - headR * 0.4, cx + headR * 0.98, headY - headR * 0.55);
    ctx.closePath();
    ctx.fill();

    // Side bow
    const bowX = cx + headR * 0.85;
    const bowY = headY - headR * 0.55;
    ctx.fillStyle = BOW;
    ctx.beginPath();
    ctx.ellipse(bowX - 8, bowY, 10, 7, -0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(bowX + 8, bowY, 10, 7, 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(bowX, bowY, 4, 0, Math.PI * 2);
    ctx.fill();

    // Eyebrows — thin, slightly arched (drawn before eyes so eyelid line stays on top)
    ctx.strokeStyle = HAIR;
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    for (const side of [-1, 1]) {
      const ex = cx + side * (headR * 0.32);
      const browY = headY - headR * 0.25;
      const browW = headR * 0.18;
      ctx.beginPath();
      ctx.moveTo(ex - browW * side, browY + 2);
      ctx.quadraticCurveTo(ex, browY - 3, ex + browW * side, browY);
      ctx.stroke();
    }

    // Eyes — almond shape, narrower vertically than before
    const eyeY = headY + headR * 0.08;
    const eyeOffX = headR * 0.32;
    const eyeW = headR * 0.20;
    const eyeH = scared ? headR * 0.04 : headR * 0.14;

    for (const side of [-1, 1]) {
      const ex = cx + side * eyeOffX;
      // Eye white
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.ellipse(ex, eyeY, eyeW, eyeH, 0, 0, Math.PI * 2);
      ctx.fill();

      if (scared) {
        // Squint line
        ctx.strokeStyle = '#0a0a0a';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(ex - eyeW, eyeY);
        ctx.quadraticCurveTo(ex, eyeY - 2, ex + eyeW, eyeY);
        ctx.stroke();
      } else {
        // Iris — deep blue-violet, fills most of the eye
        const irisX = ex + lookX * 2;
        const irisY = eyeY + lookY * 2;
        ctx.fillStyle = '#2d2360';
        ctx.beginPath();
        ctx.ellipse(irisX, irisY, eyeW * 0.55, eyeH * 0.95, 0, 0, Math.PI * 2);
        ctx.fill();
        // Pupil
        ctx.fillStyle = '#0a0a14';
        ctx.beginPath();
        ctx.ellipse(irisX, irisY, eyeW * 0.25, eyeH * 0.75, 0, 0, Math.PI * 2);
        ctx.fill();
        // Highlight
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(irisX - eyeW * 0.2, irisY - eyeH * 0.4, eyeW * 0.13, 0, Math.PI * 2);
        ctx.fill();
      }

      // Upper lid line + winged outer corner (eyeliner look)
      const outer = side; // -1 = left eye wings left, +1 = right eye wings right
      ctx.strokeStyle = '#0a0a0a';
      ctx.lineWidth = 1.8;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(ex - eyeW * outer, eyeY + 1);
      ctx.quadraticCurveTo(ex, eyeY - eyeH * 1.15, ex + eyeW * outer, eyeY - 1);
      // Wing out from the outer corner
      ctx.quadraticCurveTo(ex + (eyeW + 3) * outer, eyeY - 3, ex + (eyeW + 7) * outer, eyeY - 6);
      ctx.stroke();

      // A couple of subtle lash flicks at the outer corner
      ctx.lineWidth = 1.4;
      for (const k of [0.55, 0.78]) {
        ctx.beginPath();
        ctx.moveTo(ex + eyeW * k * outer, eyeY - eyeH * 0.9);
        ctx.lineTo(ex + (eyeW + 2) * k * outer, eyeY - eyeH * 1.4 - 2);
        ctx.stroke();
      }
    }

    // Softer blush — toned down for a mature look
    ctx.fillStyle = scared ? 'rgba(220, 80, 100, 0.32)' : 'rgba(230, 130, 150, 0.22)';
    ctx.beginPath();
    ctx.ellipse(cx - headR * 0.48, headY + headR * 0.32, headR * 0.14, headR * 0.07, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + headR * 0.48, headY + headR * 0.32, headR * 0.14, headR * 0.07, 0, 0, Math.PI * 2);
    ctx.fill();

    // Lips — soft, refined: thin bow-shaped line on top + subtle pink wash on lower lip
    const lipY = headY + headR * 0.55;
    const lipW = headR * 0.16;
    if (scared) {
      // Small surprised "o"
      ctx.fillStyle = '#8a1f4a';
      ctx.beginPath();
      ctx.ellipse(cx, lipY, headR * 0.05, headR * 0.08, 0, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // Soft rosy wash for the lower lip — gives subtle color without heavy outline
      ctx.fillStyle = 'rgba(186, 75, 115, 0.55)';
      ctx.beginPath();
      ctx.moveTo(cx - lipW * 0.85, lipY + 0.5);
      ctx.quadraticCurveTo(cx, lipY + 4, cx + lipW * 0.85, lipY + 0.5);
      ctx.quadraticCurveTo(cx, lipY + 1.8, cx - lipW * 0.85, lipY + 0.5);
      ctx.closePath();
      ctx.fill();

      // Gentle cupid's-bow lip line on top
      ctx.strokeStyle = '#9c2853';
      ctx.lineWidth = 1.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(cx - lipW, lipY);
      ctx.quadraticCurveTo(cx - lipW * 0.55, lipY - 2.6, cx - lipW * 0.18, lipY - 0.4);
      ctx.quadraticCurveTo(cx, lipY + 0.4, cx + lipW * 0.18, lipY - 0.4);
      ctx.quadraticCurveTo(cx + lipW * 0.55, lipY - 2.6, cx + lipW, lipY);
      ctx.stroke();
    }

    // Open portable umbrella held over her head (rainy/stormy + standing)
    if (!isSitting && (weather === 'rainy' || weather === 'stormy')) {
      drawOpenPortableUmbrella(cx + 22, headY - 8, currentBrightness);
    }

    // Weather particles drawn last so they cover everything
    drawWeather(now, dt);

    // Vampire teleport poofs
    for (let i = poofs.length - 1; i >= 0; i--) {
      if (!drawPoof(poofs[i], now)) poofs.splice(i, 1);
    }

    // Floating catch messages on top of everything
    drawFloatingMessages(now);

    lastFrame = now;
  }

  step();
</script>
</body>
