<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shy Girl</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(circle at 50% 50%, #1e293b, #0f172a);
    font-family: system-ui, sans-serif;
    color: #cbd5e1;
  }
  #hint {
    position: fixed;
    top: 16px;
    left: 16px;
    font-size: 14px;
    opacity: 0.7;
    pointer-events: none;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>
<div id="hint">She's shy — try to catch her with a click!</div>
<canvas id="stage"></canvas>
<script>
  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d');

  let width, height;
  function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const ellipse = {
    x: window.innerWidth / 2,
    y: window.innerHeight / 2,
    rx: 60,
    ry: 60,
    vx: 0,
    vy: 0,
  };

  const mouse = { x: -9999, y: -9999 };
  window.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  });
  window.addEventListener('mouseleave', () => {
    mouse.x = -9999;
    mouse.y = -9999;
  });

  window.addEventListener('click', (e) => {
    const dx = e.clientX - ellipse.x;
    const dy = e.clientY - ellipse.y;
    if (Math.hypot(dx, dy) <= ellipse.rx) {
      alert('you won');
    }
  });

  const FEAR_RADIUS = 220;
  const MAX_SPEED = 14;
  const FRICTION = 0.88;

  function step() {
    const dx = ellipse.x - mouse.x;
    const dy = ellipse.y - mouse.y;
    const dist = Math.hypot(dx, dy);

    if (dist < FEAR_RADIUS && dist > 0.001) {
      const strength = (1 - dist / FEAR_RADIUS) * 2.5;
      ellipse.vx += (dx / dist) * strength;
      ellipse.vy += (dy / dist) * strength;
    }

    // gentle pull back to center so it doesn't get stuck in corners
    const cx = width / 2;
    const cy = height / 2;
    ellipse.vx += (cx - ellipse.x) * 0.0008;
    ellipse.vy += (cy - ellipse.y) * 0.0008;

    ellipse.vx *= FRICTION;
    ellipse.vy *= FRICTION;

    const speed = Math.hypot(ellipse.vx, ellipse.vy);
    if (speed > MAX_SPEED) {
      ellipse.vx = (ellipse.vx / speed) * MAX_SPEED;
      ellipse.vy = (ellipse.vy / speed) * MAX_SPEED;
    }

    ellipse.x += ellipse.vx;
    ellipse.y += ellipse.vy;

    // bounce off walls
    if (ellipse.x < ellipse.rx) { ellipse.x = ellipse.rx; ellipse.vx *= -0.6; }
    if (ellipse.x > width - ellipse.rx) { ellipse.x = width - ellipse.rx; ellipse.vx *= -0.6; }
    if (ellipse.y < ellipse.ry) { ellipse.y = ellipse.ry; ellipse.vy *= -0.6; }
    if (ellipse.y > height - ellipse.ry) { ellipse.y = height - ellipse.ry; ellipse.vy *= -0.6; }

    draw(dist);
    requestAnimationFrame(step);
  }

  function draw(distToMouse) {
    ctx.clearRect(0, 0, width, height);

    const scared = distToMouse < FEAR_RADIUS;
    const r = ellipse.rx;
    const cx = ellipse.x;
    const cy = ellipse.y;

    // direction her eyes look — away from cursor when scared, otherwise idle
    let lookX = 0, lookY = 0;
    if (scared && distToMouse > 0.001) {
      lookX = (cx - mouse.x) / distToMouse;
      lookY = (cy - mouse.y) / distToMouse;
    }

    // --- hair (back layer) ---
    ctx.fillStyle = '#3b1f17';
    ctx.beginPath();
    ctx.arc(cx, cy - 4, r * 1.1, 0, Math.PI * 2);
    ctx.fill();

    // long hair flowing below
    ctx.beginPath();
    ctx.moveTo(cx - r * 1.05, cy);
    ctx.quadraticCurveTo(cx - r * 1.3, cy + r * 1.2, cx - r * 0.5, cy + r * 1.25);
    ctx.quadraticCurveTo(cx, cy + r * 1.05, cx + r * 0.5, cy + r * 1.25);
    ctx.quadraticCurveTo(cx + r * 1.3, cy + r * 1.2, cx + r * 1.05, cy);
    ctx.closePath();
    ctx.fill();

    // --- face ---
    const skin = ctx.createRadialGradient(cx, cy, r * 0.2, cx, cy, r);
    skin.addColorStop(0, '#ffe4d6');
    skin.addColorStop(1, '#f4c2a1');
    ctx.fillStyle = skin;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();

    // --- hair bangs in front ---
    ctx.fillStyle = '#3b1f17';
    ctx.beginPath();
    ctx.moveTo(cx - r * 0.95, cy - r * 0.15);
    ctx.quadraticCurveTo(cx - r * 0.7, cy - r * 1.05, cx - r * 0.1, cy - r * 0.55);
    ctx.quadraticCurveTo(cx + r * 0.2, cy - r * 0.2, cx + r * 0.55, cy - r * 0.7);
    ctx.quadraticCurveTo(cx + r * 0.85, cy - r * 1.0, cx + r * 0.98, cy - r * 0.2);
    ctx.quadraticCurveTo(cx + r * 0.7, cy - r * 0.55, cx + r * 0.3, cy - r * 0.4);
    ctx.quadraticCurveTo(cx - r * 0.2, cy - r * 0.25, cx - r * 0.95, cy - r * 0.15);
    ctx.closePath();
    ctx.fill();

    // --- hair bow on the side ---
    const bowX = cx + r * 0.85;
    const bowY = cy - r * 0.55;
    ctx.fillStyle = scared ? '#fb7185' : '#f472b6';
    ctx.beginPath();
    ctx.ellipse(bowX - 8, bowY, 10, 7, -0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(bowX + 8, bowY, 10, 7, 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(bowX, bowY, 4, 0, Math.PI * 2);
    ctx.fill();

    // --- eyes ---
    const eyeY = cy + r * 0.05;
    const eyeOffX = r * 0.32;
    const eyeW = r * 0.16;
    const eyeH = scared ? r * 0.08 : r * 0.22;

    for (const side of [-1, 1]) {
      const ex = cx + side * eyeOffX;
      // eye white
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.ellipse(ex, eyeY, eyeW, eyeH, 0, 0, Math.PI * 2);
      ctx.fill();

      if (scared) {
        // worried squint line
        ctx.strokeStyle = '#2b1810';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(ex - eyeW, eyeY);
        ctx.quadraticCurveTo(ex, eyeY - 3, ex + eyeW, eyeY);
        ctx.stroke();
      } else {
        // iris
        const irisX = ex + lookX * 3;
        const irisY = eyeY + lookY * 3;
        ctx.fillStyle = '#5b8def';
        ctx.beginPath();
        ctx.arc(irisX, irisY, eyeW * 0.75, 0, Math.PI * 2);
        ctx.fill();
        // pupil
        ctx.fillStyle = '#1a1a2e';
        ctx.beginPath();
        ctx.arc(irisX, irisY, eyeW * 0.4, 0, Math.PI * 2);
        ctx.fill();
        // shine
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(irisX - eyeW * 0.25, irisY - eyeW * 0.3, eyeW * 0.22, 0, Math.PI * 2);
        ctx.fill();
      }

      // eyelashes
      ctx.strokeStyle = '#2b1810';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(ex - eyeW, eyeY - eyeH * 0.7);
      ctx.lineTo(ex - eyeW - 3, eyeY - eyeH - 2);
      ctx.moveTo(ex, eyeY - eyeH);
      ctx.lineTo(ex, eyeY - eyeH - 4);
      ctx.moveTo(ex + eyeW, eyeY - eyeH * 0.7);
      ctx.lineTo(ex + eyeW + 3, eyeY - eyeH - 2);
      ctx.stroke();
    }

    // --- blush ---
    ctx.fillStyle = scared ? 'rgba(244, 63, 94, 0.55)' : 'rgba(244, 114, 182, 0.45)';
    ctx.beginPath();
    ctx.ellipse(cx - r * 0.45, cy + r * 0.35, r * 0.16, r * 0.1, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + r * 0.45, cy + r * 0.35, r * 0.16, r * 0.1, 0, 0, Math.PI * 2);
    ctx.fill();

    // --- mouth ---
    ctx.strokeStyle = '#c2185b';
    ctx.fillStyle = '#e91e63';
    ctx.lineWidth = 2;
    if (scared) {
      // little "o" of surprise
      ctx.beginPath();
      ctx.ellipse(cx, cy + r * 0.55, r * 0.07, r * 0.1, 0, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // gentle smile
      ctx.beginPath();
      ctx.moveTo(cx - r * 0.18, cy + r * 0.5);
      ctx.quadraticCurveTo(cx, cy + r * 0.68, cx + r * 0.18, cy + r * 0.5);
      ctx.stroke();
    }
  }

  step();
</script>
</body>
</html>
