<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shy Girl</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #87ceeb;
    font-family: system-ui, sans-serif;
    color: #1f2937;
  }
  #hint {
    position: fixed;
    top: 16px;
    left: 16px;
    font-size: 14px;
    opacity: 0.85;
    pointer-events: none;
    text-shadow: 0 1px 2px rgba(255,255,255,0.6);
  }
  #clock {
    position: fixed;
    top: 16px;
    right: 16px;
    font-size: 14px;
    font-variant-numeric: tabular-nums;
    opacity: 0.85;
    pointer-events: none;
    text-shadow: 0 1px 2px rgba(255,255,255,0.6);
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>
<div id="hint">She's shy — try to catch her with a click!</div>
<div id="clock">--:--</div>
<canvas id="stage"></canvas>
<script>
  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d');

  let width, height;
  function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const ellipse = {
    x: window.innerWidth / 2,
    y: window.innerHeight / 2,
    rx: 70,
    ry: 130,
    vx: 0,
    vy: 0,
  };

  const mouse = { x: -9999, y: -9999 };
  window.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  });
  window.addEventListener('mouseleave', () => {
    mouse.x = -9999;
    mouse.y = -9999;
  });

  window.addEventListener('click', (e) => {
    const dx = (e.clientX - ellipse.x) / ellipse.rx;
    const dy = (e.clientY - ellipse.y) / ellipse.ry;
    if (dx * dx + dy * dy <= 1) {
      alert('you won');
    }
  });

  const FEAR_RADIUS = 220;
  const MAX_SPEED = 14;
  const FRICTION = 0.88;

  // -------- Day / sky / clouds --------
  const CYCLE_SECONDS = 90; // one full day every 90 seconds
  const startTime = performance.now();
  const clockEl = document.getElementById('clock');

  function lerp(a, b, t) { return a + (b - a) * t; }
  function lerpC(c1, c2, t) {
    return [
      Math.round(lerp(c1[0], c2[0], t)),
      Math.round(lerp(c1[1], c2[1], t)),
      Math.round(lerp(c1[2], c2[2], t)),
    ];
  }
  function rgb(c, a = 1) {
    return a < 1 ? `rgba(${c[0]},${c[1]},${c[2]},${a})` : `rgb(${c[0]},${c[1]},${c[2]})`;
  }

  // Sky keyframes around a 24h day (t in [0,1], 0 = midnight)
  const SKY = [
    { t: 0.00, top: [10, 14, 39],    bot: [26, 26, 62] },     // midnight
    { t: 0.20, top: [74, 58, 110],   bot: [255, 170, 130] },  // dawn
    { t: 0.30, top: [135, 206, 235], bot: [255, 224, 178] },  // sunrise
    { t: 0.50, top: [77, 171, 247],  bot: [185, 226, 255] },  // noon
    { t: 0.70, top: [116, 192, 252], bot: [255, 214, 165] },  // afternoon
    { t: 0.80, top: [255, 107, 157], bot: [255, 158, 110] },  // sunset
    { t: 0.90, top: [61, 43, 86],    bot: [200, 90, 130] },   // dusk
    { t: 1.00, top: [10, 14, 39],    bot: [26, 26, 62] },     // midnight
  ];

  function skyColors(t) {
    for (let i = 0; i < SKY.length - 1; i++) {
      const a = SKY[i], b = SKY[i + 1];
      if (t >= a.t && t <= b.t) {
        const k = (t - a.t) / (b.t - a.t);
        return { top: lerpC(a.top, b.top, k), bot: lerpC(a.bot, b.bot, k) };
      }
    }
    return { top: SKY[0].top, bot: SKY[0].bot };
  }

  // Clouds — drift across, wrap around
  const clouds = [];
  function spawnClouds() {
    clouds.length = 0;
    const count = 7;
    for (let i = 0; i < count; i++) {
      clouds.push({
        x: Math.random() * width,
        y: 40 + Math.random() * (height * 0.4),
        scale: 0.6 + Math.random() * 1.0,
        speed: 8 + Math.random() * 18, // px/sec
        puffs: 3 + Math.floor(Math.random() * 3),
      });
    }
  }

  // Stars — only visible at night
  const stars = [];
  function spawnStars() {
    stars.length = 0;
    for (let i = 0; i < 80; i++) {
      stars.push({
        x: Math.random() * width,
        y: Math.random() * height * 0.7,
        r: Math.random() * 1.4 + 0.3,
        phase: Math.random() * Math.PI * 2,
      });
    }
  }

  spawnClouds();
  spawnStars();
  window.addEventListener('resize', () => { spawnClouds(); spawnStars(); });

  let lastFrame = performance.now();

  function drawBackground(now) {
    const elapsed = (now - startTime) / 1000;
    // start mid-morning so first impression is sunny
    const t = ((elapsed / CYCLE_SECONDS) + 0.35) % 1;

    const { top, bot } = skyColors(t);

    // Sky gradient
    const sky = ctx.createLinearGradient(0, 0, 0, height);
    sky.addColorStop(0, rgb(top));
    sky.addColorStop(1, rgb(bot));
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, width, height);

    // Stars — fade in with darkness (use top color brightness)
    const brightness = (top[0] + top[1] + top[2]) / (3 * 255);
    const starAlpha = Math.max(0, 1 - brightness * 2.5);
    if (starAlpha > 0.01) {
      for (const s of stars) {
        const twinkle = 0.5 + 0.5 * Math.sin(now / 400 + s.phase);
        ctx.fillStyle = `rgba(255, 255, 230, ${starAlpha * twinkle})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Sun arc — visible roughly 0.22..0.78
    const horizon = height * 0.82;
    if (t > 0.22 && t < 0.78) {
      const n = (t - 0.22) / 0.56;
      const sunX = lerp(60, width - 60, n);
      const sunY = horizon - Math.sin(Math.PI * n) * (horizon - 70);
      const sunR = 38;

      // glow
      const glow = ctx.createRadialGradient(sunX, sunY, sunR * 0.5, sunX, sunY, sunR * 4);
      glow.addColorStop(0, 'rgba(255, 240, 180, 0.55)');
      glow.addColorStop(1, 'rgba(255, 240, 180, 0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(sunX, sunY, sunR * 4, 0, Math.PI * 2);
      ctx.fill();

      // sun disc — warmer near horizon
      const nearHorizon = Math.min(1, Math.abs(n - 0.5) * 2);
      const sunCore = lerpC([255, 250, 220], [255, 160, 80], nearHorizon);
      ctx.fillStyle = rgb(sunCore);
      ctx.beginPath();
      ctx.arc(sunX, sunY, sunR, 0, Math.PI * 2);
      ctx.fill();
    }

    // Moon — opposite side of the cycle (night phase)
    const moonRaw = ((t - 0.78) + 1) % 1; // 0 at moonrise (t=0.78), 1 at moonset (t=0.22 next day, span 0.44)
    if (moonRaw < 0.44) {
      const n = moonRaw / 0.44;
      const moonX = lerp(60, width - 60, n);
      const moonY = horizon - Math.sin(Math.PI * n) * (horizon - 70);
      const moonR = 28;

      const glow = ctx.createRadialGradient(moonX, moonY, moonR * 0.5, moonX, moonY, moonR * 3);
      glow.addColorStop(0, `rgba(220, 230, 255, ${0.4 * starAlpha})`);
      glow.addColorStop(1, 'rgba(220, 230, 255, 0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(moonX, moonY, moonR * 3, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#f5f3e8';
      ctx.beginPath();
      ctx.arc(moonX, moonY, moonR, 0, Math.PI * 2);
      ctx.fill();
      // craters
      ctx.fillStyle = 'rgba(180, 175, 160, 0.6)';
      ctx.beginPath();
      ctx.arc(moonX - 8, moonY - 6, 4, 0, Math.PI * 2);
      ctx.arc(moonX + 6, moonY + 4, 3, 0, Math.PI * 2);
      ctx.arc(moonX + 2, moonY - 10, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Clouds — tint slightly with sky color at sunset
    const dt = (now - lastFrame) / 1000;
    for (const c of clouds) {
      c.x += c.speed * dt;
      if (c.x - 100 * c.scale > width) c.x = -100 * c.scale;

      const tint = lerpC([255, 255, 255], bot, 0.3);
      const cloudAlpha = 0.65 + 0.25 * brightness;
      drawCloud(c.x, c.y, c.scale, c.puffs, tint, cloudAlpha);
    }

    // Ground / grass
    const grassTop = lerpC([90, 170, 80], [20, 40, 30], 1 - brightness);
    const grassBot = lerpC([50, 110, 50], [10, 25, 15], 1 - brightness);
    const grad = ctx.createLinearGradient(0, horizon, 0, height);
    grad.addColorStop(0, rgb(grassTop));
    grad.addColorStop(1, rgb(grassBot));
    ctx.fillStyle = grad;
    ctx.fillRect(0, horizon, width, height - horizon);

    // update clock
    const hours = Math.floor(t * 24);
    const minutes = Math.floor((t * 24 * 60) % 60);
    clockEl.textContent = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
  }

  function drawCloud(x, y, scale, puffs, tint, alpha) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scale, scale);
    ctx.globalAlpha = alpha;

    // soft shadow under cloud
    ctx.fillStyle = rgb(lerpC(tint, [120, 130, 150], 0.3), 0.6);
    for (let i = 0; i < puffs; i++) {
      ctx.beginPath();
      ctx.arc(i * 22 - puffs * 8, 6, 18, 0, Math.PI * 2);
      ctx.fill();
    }

    // body
    ctx.fillStyle = rgb(tint);
    ctx.beginPath();
    ctx.arc(0, 0, 22, 0, Math.PI * 2);
    for (let i = 1; i < puffs; i++) {
      ctx.arc(i * 20, -2 + (i % 2) * 4, 18 - (i % 2) * 2, 0, Math.PI * 2);
    }
    ctx.arc(puffs * 20 - 4, 4, 16, 0, Math.PI * 2);
    ctx.fill();

    // highlight
    ctx.fillStyle = rgb(lerpC(tint, [255, 255, 255], 0.5), 0.9);
    ctx.beginPath();
    ctx.arc(-4, -6, 10, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
    ctx.globalAlpha = 1;
  }

  function groundY() {
    return height * 0.82 - ellipse.ry * 0.95;
  }

  // Place her on the ground initially
  ellipse.y = groundY();

  function step() {
    const dx = ellipse.x - mouse.x;
    const dy = ellipse.y - mouse.y;
    const dist = Math.hypot(dx, dy);

    // Fear only pushes horizontally — she's walking on the ground
    if (dist < FEAR_RADIUS && dist > 0.001) {
      const strength = (1 - dist / FEAR_RADIUS) * 2.5;
      ellipse.vx += (dx / dist) * strength;
    }

    // gentle horizontal pull back toward center
    ellipse.vx += (width / 2 - ellipse.x) * 0.0008;

    ellipse.vx *= FRICTION;

    if (Math.abs(ellipse.vx) > MAX_SPEED) {
      ellipse.vx = Math.sign(ellipse.vx) * MAX_SPEED;
    }

    ellipse.x += ellipse.vx;

    // bounce off left/right walls
    if (ellipse.x < ellipse.rx) { ellipse.x = ellipse.rx; ellipse.vx *= -0.6; }
    if (ellipse.x > width - ellipse.rx) { ellipse.x = width - ellipse.rx; ellipse.vx *= -0.6; }

    // Lock to ground
    ellipse.vy = 0;
    ellipse.y = groundY();

    draw(dist);
    requestAnimationFrame(step);
  }

  function draw(distToMouse) {
    const now = performance.now();
    drawBackground(now);
    lastFrame = now;

    const scared = distToMouse < FEAR_RADIUS;
    const cx = ellipse.x;
    const cy = ellipse.y;
    const ry = ellipse.ry;

    // Body anchor points (relative to center cy)
    const headR = 38;
    const headY = cy - ry * 0.62;
    const neckY = headY + headR * 0.85;
    const shoulderY = cy - ry * 0.32;
    const waistY = cy - ry * 0.05;
    const hipY = cy + ry * 0.25;
    const kneeY = cy + ry * 0.6;
    const footY = cy + ry * 0.95;

    // Look direction
    let lookX = 0, lookY = 0;
    if (scared && distToMouse > 0.001) {
      lookX = (cx - mouse.x) / distToMouse;
      lookY = (cy - mouse.y) / distToMouse;
    }

    // Run animation phase — faster cycle when scared
    const speed = Math.hypot(ellipse.vx, ellipse.vy);
    const phase = Date.now() / (scared ? 70 : 350);
    const swing = Math.sin(phase) * (scared ? 0.55 : 0.1);

    // Direction she's running (for leaning)
    const moveDir = speed > 0.5 ? Math.atan2(ellipse.vy, ellipse.vx) : 0;
    const lean = scared ? Math.cos(moveDir) * 0.08 : 0;

    const SKIN = '#f4c2a1';
    const SKIN_LIGHT = '#ffe4d6';
    const HAIR = '#3b1f17';
    const DRESS = scared ? '#fb7185' : '#f472b6';
    const DRESS_DARK = scared ? '#e11d48' : '#db2777';

    // ---- Back hair (drawn first so body/arms/neck appear in front) ----
    ctx.fillStyle = HAIR;
    ctx.beginPath();
    ctx.moveTo(cx - headR * 1.0, headY - headR * 0.2);
    ctx.quadraticCurveTo(cx - headR * 1.05, headY - headR * 1.05, cx, headY - headR * 1.1);
    ctx.quadraticCurveTo(cx + headR * 1.05, headY - headR * 1.05, cx + headR * 1.0, headY - headR * 0.2);
    ctx.lineTo(cx + headR * 1.05, shoulderY + 8);
    ctx.quadraticCurveTo(cx, shoulderY + 4, cx - headR * 1.05, shoulderY + 8);
    ctx.closePath();
    ctx.fill();

    // ---- Legs ----
    ctx.strokeStyle = SKIN;
    ctx.lineWidth = 11;
    ctx.lineCap = 'round';

    const legSwing = Math.sin(phase) * (scared ? 14 : 2);
    const leftFootX = cx - 12 + legSwing;
    const rightFootX = cx + 12 - legSwing;

    ctx.beginPath();
    ctx.moveTo(cx - 12, hipY);
    ctx.quadraticCurveTo(cx - 14, kneeY, leftFootX, footY);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(cx + 12, hipY);
    ctx.quadraticCurveTo(cx + 14, kneeY, rightFootX, footY);
    ctx.stroke();

    // Shoes
    ctx.fillStyle = '#7c2d12';
    ctx.beginPath();
    ctx.ellipse(leftFootX, footY + 2, 10, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(rightFootX, footY + 2, 10, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    // ---- Dress (skirt) ----
    const skirtTopY = waistY;
    const skirtBottomY = hipY + 18;
    ctx.fillStyle = DRESS;
    ctx.beginPath();
    ctx.moveTo(cx - 22, skirtTopY);
    ctx.lineTo(cx + 22, skirtTopY);
    ctx.lineTo(cx + 46, skirtBottomY);
    ctx.quadraticCurveTo(cx, skirtBottomY + 8, cx - 46, skirtBottomY);
    ctx.closePath();
    ctx.fill();

    // Skirt hem shadow
    ctx.fillStyle = DRESS_DARK;
    ctx.beginPath();
    ctx.moveTo(cx - 46, skirtBottomY);
    ctx.quadraticCurveTo(cx, skirtBottomY + 8, cx + 46, skirtBottomY);
    ctx.quadraticCurveTo(cx + 44, skirtBottomY + 5, cx + 42, skirtBottomY + 2);
    ctx.quadraticCurveTo(cx, skirtBottomY + 10, cx - 42, skirtBottomY + 2);
    ctx.quadraticCurveTo(cx - 44, skirtBottomY + 5, cx - 46, skirtBottomY);
    ctx.closePath();
    ctx.fill();

    // ---- Torso (dress top) ----
    ctx.fillStyle = DRESS;
    ctx.beginPath();
    ctx.moveTo(cx - 18, shoulderY);
    ctx.quadraticCurveTo(cx - 26, waistY - 10, cx - 22, skirtTopY);
    ctx.lineTo(cx + 22, skirtTopY);
    ctx.quadraticCurveTo(cx + 26, waistY - 10, cx + 18, shoulderY);
    ctx.closePath();
    ctx.fill();

    // Collar trim
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.ellipse(cx, shoulderY, 14, 5, 0, 0, Math.PI);
    ctx.fill();

    // ---- Arms ----
    ctx.strokeStyle = SKIN;
    ctx.lineWidth = 9;
    ctx.lineCap = 'round';

    // when scared, arms fly out wider; idle = relaxed at sides
    const armBase = scared ? Math.PI * 0.55 : Math.PI * 0.5;
    const armSpread = scared ? 0.5 : 0.15;
    const armLen = 48;

    const lShoulderX = cx - 18;
    const lArmAngle = armBase + armSpread + swing;
    const lElbowX = lShoulderX + Math.cos(Math.PI - lArmAngle * 0.6) * armLen * 0.5;
    const lElbowY = shoulderY + Math.sin(lArmAngle * 0.7) * armLen * 0.5;
    const lHandX = lShoulderX - Math.sin(lArmAngle) * armLen;
    const lHandY = shoulderY + Math.cos(lArmAngle) * armLen;

    ctx.beginPath();
    ctx.moveTo(lShoulderX, shoulderY);
    ctx.quadraticCurveTo(lElbowX, lElbowY, lHandX, lHandY);
    ctx.stroke();

    const rShoulderX = cx + 18;
    const rArmAngle = armBase + armSpread - swing;
    const rElbowX = rShoulderX - Math.cos(Math.PI - rArmAngle * 0.6) * armLen * 0.5;
    const rElbowY = shoulderY + Math.sin(rArmAngle * 0.7) * armLen * 0.5;
    const rHandX = rShoulderX + Math.sin(rArmAngle) * armLen;
    const rHandY = shoulderY + Math.cos(rArmAngle) * armLen;

    ctx.beginPath();
    ctx.moveTo(rShoulderX, shoulderY);
    ctx.quadraticCurveTo(rElbowX, rElbowY, rHandX, rHandY);
    ctx.stroke();

    // Hands
    ctx.fillStyle = SKIN_LIGHT;
    ctx.beginPath();
    ctx.arc(lHandX, lHandY, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(rHandX, rHandY, 6, 0, Math.PI * 2);
    ctx.fill();

    // ---- Neck ----
    ctx.fillStyle = SKIN;
    ctx.fillRect(cx - 6, neckY, 12, shoulderY - neckY + 2);

    // ---- Head (face + front hair, drawn last so they cover neck/shoulders) ----
    // Face
    const skin = ctx.createRadialGradient(cx, headY, headR * 0.2, cx, headY, headR);
    skin.addColorStop(0, SKIN_LIGHT);
    skin.addColorStop(1, SKIN);
    ctx.fillStyle = skin;
    ctx.beginPath();
    ctx.arc(cx, headY, headR, 0, Math.PI * 2);
    ctx.fill();

    // Bangs — simple, straight across with a slight rounded edge
    ctx.fillStyle = HAIR;
    ctx.beginPath();
    ctx.moveTo(cx - headR * 0.95, headY - headR * 0.55);
    ctx.quadraticCurveTo(cx - headR * 0.95, headY - headR * 1.0, cx, headY - headR * 1.05);
    ctx.quadraticCurveTo(cx + headR * 0.95, headY - headR * 1.0, cx + headR * 0.95, headY - headR * 0.55);
    ctx.quadraticCurveTo(cx + headR * 0.5, headY - headR * 0.25, cx, headY - headR * 0.3);
    ctx.quadraticCurveTo(cx - headR * 0.5, headY - headR * 0.25, cx - headR * 0.95, headY - headR * 0.55);
    ctx.closePath();
    ctx.fill();

    // Side bow
    const bowX = cx + headR * 0.85;
    const bowY = headY - headR * 0.55;
    ctx.fillStyle = scared ? '#fb7185' : '#ec4899';
    ctx.beginPath();
    ctx.ellipse(bowX - 8, bowY, 10, 7, -0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(bowX + 8, bowY, 10, 7, 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(bowX, bowY, 4, 0, Math.PI * 2);
    ctx.fill();

    // Eyes
    const eyeY = headY + headR * 0.05;
    const eyeOffX = headR * 0.32;
    const eyeW = headR * 0.16;
    const eyeH = scared ? headR * 0.08 : headR * 0.22;

    for (const side of [-1, 1]) {
      const ex = cx + side * eyeOffX;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.ellipse(ex, eyeY, eyeW, eyeH, 0, 0, Math.PI * 2);
      ctx.fill();

      if (scared) {
        ctx.strokeStyle = '#2b1810';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(ex - eyeW, eyeY);
        ctx.quadraticCurveTo(ex, eyeY - 3, ex + eyeW, eyeY);
        ctx.stroke();
      } else {
        const irisX = ex + lookX * 3;
        const irisY = eyeY + lookY * 3;
        ctx.fillStyle = '#5b8def';
        ctx.beginPath();
        ctx.arc(irisX, irisY, eyeW * 0.75, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#1a1a2e';
        ctx.beginPath();
        ctx.arc(irisX, irisY, eyeW * 0.4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(irisX - eyeW * 0.25, irisY - eyeW * 0.3, eyeW * 0.22, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.strokeStyle = '#2b1810';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(ex - eyeW, eyeY - eyeH * 0.7);
      ctx.lineTo(ex - eyeW - 3, eyeY - eyeH - 2);
      ctx.moveTo(ex, eyeY - eyeH);
      ctx.lineTo(ex, eyeY - eyeH - 4);
      ctx.moveTo(ex + eyeW, eyeY - eyeH * 0.7);
      ctx.lineTo(ex + eyeW + 3, eyeY - eyeH - 2);
      ctx.stroke();
    }

    // Blush
    ctx.fillStyle = scared ? 'rgba(244, 63, 94, 0.55)' : 'rgba(244, 114, 182, 0.45)';
    ctx.beginPath();
    ctx.ellipse(cx - headR * 0.45, headY + headR * 0.35, headR * 0.16, headR * 0.1, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + headR * 0.45, headY + headR * 0.35, headR * 0.16, headR * 0.1, 0, 0, Math.PI * 2);
    ctx.fill();

    // Mouth
    ctx.strokeStyle = '#c2185b';
    ctx.fillStyle = '#e91e63';
    ctx.lineWidth = 2;
    if (scared) {
      ctx.beginPath();
      ctx.ellipse(cx, headY + headR * 0.55, headR * 0.07, headR * 0.1, 0, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.moveTo(cx - headR * 0.18, headY + headR * 0.5);
      ctx.quadraticCurveTo(cx, headY + headR * 0.68, cx + headR * 0.18, headY + headR * 0.5);
      ctx.stroke();
    }
  }

  step();
